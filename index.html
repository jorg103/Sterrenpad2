  document.body.appendChild(overlay);
}

function confirmBuy(itemId, slot) {
  document.getElementById('buy-confirm')?.remove();
  wardrobeAction(itemId, slot); // This handles buying + equipping
  window._tryOnItem = null;
  window._tryOnSlot = null;
  const previewBar = document.getElementById('avatar-preview-bar');
  if (previewBar) previewBar.style.display = 'none';
}

function buyPokemon(cardId) {
  const card = POKEMON_CARDS.find(c=>c.id===cardId);
  if (!card) return;
  const owned = state.ownedAvatarItems[state.currentPlayer] || [];
  if (owned.includes(cardId)) { showToast('🎴 Al in je album!', false); return; }
  const p = getPlayer();
  if ((p.coins||0) < card.price) { showToast('❌ Niet genoeg coins! Je hebt ' + (p.coins||0) + ' nodig, kost ' + card.price, true); return; }
  p.coins = (p.coins||0) - card.price;
  if (!state.ownedAvatarItems[state.currentPlayer]) state.ownedAvatarItems[state.currentPlayer] = [];
  state.ownedAvatarItems[state.currentPlayer].push(cardId);
  updateCoinDisplay(); saveState(); sfxBuy();
  const r = POKEMON_RARITY[card.rarity];
  showToast(card.emoji + ' ' + card.name + ' gevangen! ' + r.label + '!');
  renderAvatarBuilder();
}

function wardrobeAction(itemId, slot) {
  const item = AVATAR_ITEMS.find(i => i.id===itemId);
  if (!item) return;
  const owned = state.ownedAvatarItems[state.currentPlayer] || [];
  const p = getPlayer();
  // Zorg dat equipped altijd alle slots heeft
  if (!p.equipped) p.equipped = {};
  ['head','outfit','accessory','pet','bg'].forEach(s => {
    if (!(s in p.equipped)) p.equipped[s] = null;
  });

  if (owned.includes(itemId)) {
    // Toggle equip/uitdoen
    if (p.equipped[slot] === itemId) {
      p.equipped[slot] = null;
      showToast(`${item.emoji} Uitgetrokken`);
    } else {
      p.equipped[slot] = itemId;
      sfxBuy();
      showToast(`${item.emoji} ${item.name} aangetrokken! ✅`);
    }
    saveState();
    renderAvatarBuilder();
  } else {
    // Kopen + direct aantrekken
    if (getCoins() < item.price) { showToast('Onvoldoende Titan Coins! 🪙', true); return; }
    getPlayer().coins -= item.price;
    state.ownedAvatarItems[state.currentPlayer] = [...owned, itemId];
    p.equipped[slot] = itemId; // direct aantrekken!
    saveState();
    updateCoinDisplay();
    sfxBuy();
    showToast(`🎉 ${item.emoji} ${item.name} gekocht & aangetrokken!`);
    renderAvatarBuilder();
  }
}

function selectBody(bodyId) {
  const body = AVATAR_BASE_BODIES.find(b => b.id===bodyId);
  if (!body) return;
  const owned = state.ownedAvatarItems[state.currentPlayer] || [];
  const p = getPlayer();
  if (body.price > 0 && !owned.includes(bodyId)) {
    if (getCoins() < body.price) { showToast('Onvoldoende Titan Coins! 🪙', true); return; }
    getPlayer().coins -= body.price;
    state.ownedAvatarItems[state.currentPlayer] = [...owned, bodyId];
    updateCoinDisplay();
    showToast(`${body.emoji} ${body.name} gekocht!`);
  }
  p.avatarBody = bodyId;
  saveState(); renderAvatarBuilder();
}

function setAvatarColor(color) {
  getPlayer().avatarColor = color;
  saveState(); renderAvatarBuilder();
}

// ===== TOAST =====
function showToast(msg, bad=false) {
  const t = document.getElementById('toast');
  if (!t) return;
  // Reset eerst volledig
  t.classList.remove('show', 'bad');
  t.textContent = '';
  // Clear vorige timer
  if (window._toastTO) { clearTimeout(window._toastTO); window._toastTO = null; }
  // Kleine vertraging zodat de reset zichtbaar is bij snelle opeenvolging
  requestAnimationFrame(() => {
    t.textContent = msg;
    t.className = 'feedback-toast' + (bad ? ' bad' : '') + ' show';
    window._toastTO = setTimeout(() => {
      t.classList.remove('show');
      // Na animatie ook tekst wissen
      setTimeout(() => { if (!t.classList.contains('show')) t.textContent = ''; }, 400);
    }, 2500);
  });
  if (bad) sfxWrong();
}

function tickInvestments() {
  // Elke keer dat wallet geopend wordt, passen investeringen zich aan (gesimuleerde tijd)
  const w = getWallet();
  const now = Date.now();
  if (!w.lastTick) { w.lastTick = now; return; }
  // Hoeveel "ticks" zijn er verstreken (1 tick per 2 uur echte tijd, of we simuleren 1 per bezoek)
  const ticksPassed = 1; // 1 tick per wallet-bezoek voor speelbaarheid

  for (const [id, holding] of Object.entries(w.investments)) {
    const inv = INVESTMENTS[id];
    if (!inv || holding.amount <= 0) continue;
    let change = inv.trend; // basis trend
    // Nieuws effect
    if (currentNews && currentNews.affected === id) change += currentNews.effect;
    else if (currentNews && currentNews.affected === null) change += currentNews.effect;
    // Volatiliteit (willekeurige ruis)
    change += (Math.random() - 0.5) * inv.volatility * 2;
    // Clamp: nooit onder 10% van originele waarde
    const newValue = Math.max(holding.value * (1 + change), holding.amount * 0.1);
    holding.value = Math.round(newValue * 100) / 100;
    holding.history = holding.history || [];
    holding.history.push(Math.round(holding.value));
    if (holding.history.length > 10) holding.history.shift();
  }
  w.lastTick = now;
  saveState();
}

function pickNews() {
  currentNews = MARKET_NEWS[Math.floor(Math.random() * MARKET_NEWS.length)];

// ===== WALLET ACTIONS =====
function setWalletTab(tab) { walletTab = tab; renderWallet(); }

function doSave(amt) {
  if (getCoins() < amt) { showToast('Niet genoeg muntjes!', true); return; }
  getPlayer().coins -= amt;
  getWallet().savings += amt;
  applyRente();
  saveState(); updateCoinDisplay(); renderWallet();
  showToast(`🏦 ${amt} muntjes gespaard!`);
}
function doSaveAll() { doSave(getCoins()); }
function doSaveCustom() {
  const amt = parseInt(document.getElementById('save-amount').value);
  if (!amt || amt <= 0) return;
  doSave(amt);
}
function doWithdraw(amt) {
  const w = getWallet();
  if (w.savings < amt) { showToast('Titans Bank heeft niet genoeg!', true); return; }
  w.savings -= amt;
  getPlayer().coins += amt;
  saveState(); updateCoinDisplay(); renderWallet();
  showToast(`🏧 ${amt} muntjes opgenomen`);
}
function doWithdrawAll() { doWithdraw(getWallet().savings); }

function doSaveToGoal(amt) {
  if (getCoins() < amt) { showToast('Niet genoeg muntjes!', true); return; }
  getPlayer().coins -= amt;
  const w = getWallet();
  w.goalSaved += amt;
  const goal = SAVING_GOALS[w.goal];
  // Check milestones
  goal.milestones.forEach(m => {
    if (w.goalSaved >= m.at && w.goalSaved - amt < m.at) showToast(m.msg);
  });
  if (w.goalSaved >= goal.target) {
    setTimeout(() => showGoalReached(goal), 500);
  }
  saveState(); updateCoinDisplay(); renderWallet();
  showToast(`🎯 +${amt} naar je doel!`);
}

function checkDreamGoalMilestone() {
  const p = getPlayer();
  const w = getWallet();
  const totalEarned = (p.coins || 0) + (w.savings || 0) + Math.round(getTotalInvestmentValue());
  const lastMilestone = w.lastDreamMilestone || 0;
  const nextMilestone = (Math.floor(lastMilestone / 1000) + 1) * 1000;

    w.lastDreamMilestone = nextMilestone;
    saveState();
    setTimeout(() => showDreamGoalPrompt(nextMilestone), 500);
  }
}

function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pieces = [];
  const colors = ['#f5a623','#e94560','#57c785','#0f3460','#ffffff','#ffd700'];

  // Maak 150 confetti stukjes
  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 12 + 4,
      h: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 8,
      shape: Math.random() < 0.3 ? 'circle' : 'rect',
    });
  }

  let frame = 0;
  function draw() {
    if (!document.getElementById('confetti-canvas')) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.w/2, 0, Math.PI*2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      }
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.rotSpeed;
      p.vy += 0.05; // zwaartekracht
      // Wrap terug naar boven
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
    });
    frame++;
    if (frame < 300) requestAnimationFrame(draw); // 5 seconden
  }
  draw();
}

function doBuyInvestment(id, amt) {
  if (getCoins() < amt) { showToast('Niet genoeg muntjes!', true); return; }
  getPlayer().coins -= amt;
  const w = getWallet();
  if (!w.investments[id]) w.investments[id] = { amount:0, value:0, history:[] };
  w.investments[id].amount += amt;
  w.investments[id].value += amt;
  saveState(); updateCoinDisplay(); renderWallet();
  showToast(`${INVESTMENTS[id].emoji} ${amt} muntjes belegd in ${INVESTMENTS[id].name}!`);
}

function doSellInvestment(id) {
  const w = getWallet();
  const h = w.investments[id];
  if (!h || h.value <= 0) return;
  const sellValue = Math.round(h.value);
  getPlayer().coins += sellValue;
  const profit = sellValue - h.amount;
  delete w.investments[id];
  saveState(); updateCoinDisplay(); renderWallet();
  const msg = profit >= 0 ? `💰 Verkocht voor ${sellValue}! Winst: +${profit} 🎉` : `😬 Verkocht voor ${sellValue}. Verlies: ${profit}`;
  showToast(msg, profit < 0);
}

function applyRente() {
  const w = getWallet();
  const interest = getSavingsInterest(w.savings);
  if (interest > 0) { w.savings += interest; }
}

function getSavingsInterest(savings) {
  if (savings <= 0) return 0;
  return Math.max(1, Math.floor(savings * 0.02)); // 2% rente
}

function getTotalInvestmentValue() {
  const w = getWallet();
  return Object.values(w.investments).reduce((sum, h) => sum + (h.value||0), 0);
}
function getTotalInvestmentCost() {
  const w = getWallet();
  return Object.values(w.investments).reduce((sum, h) => sum + (h.amount||0), 0);
}

// Hoeveel ms is "snel"?
const FAST_MS = 5000;   // onder 5 sec = snel
const SLOW_MS = 15000;  // boven 15 sec = langzaam

// Pas vaardigheid aan na een antwoord
function recordAnswer(type, correct, ms) {
  const p = getPlayer();
  if (!p.skills) p.skills = { spell:50, math:50, lang:50 };
  if (!p.history) p.history = [];

  const fast = ms < FAST_MS;
  const slow = ms > SLOW_MS;
  const currentSkill = p.skills[type] || 50;

  // Hogere skill = harder to gain, easier to lose (meer uitdaging bij topniveau)
  const atTop = currentSkill >= 90;
  let delta = 0;
  if (correct && fast)  delta = atTop ? +3 : +8;
  else if (correct)     delta = atTop ? +2 : +4;
  else if (!correct && slow) delta = atTop ? -4 : -6;
  else if (!correct)    delta = atTop ? -3 : -3;

  // Skills kunnen nu tot 120 gaan (Expert=100-110, Titan=110-120)
  p.skills[type] = Math.max(5, Math.min(120, currentSkill + delta));
  p.history.push({ type, correct, ms, delta, skill: p.skills[type] });
  if (p.history.length > 50) p.history.shift();

  p.bonusDue = (p.bonusDue||0) + 1;

  // Check voor niveau-upgrade melding
  const prevSkill = currentSkill;
  const next = p.skills[type];
  const breakthrough = checkBreakthrough(type, prevSkill, next);
  if (breakthrough === 100 || breakthrough === 110) {
    const tier = breakthrough >= 110 ? 'Titan' : 'Expert';
    setTimeout(() => showLevelUpgrade(type, tier), 1500);
    setTimeout(() => showBreakthroughCelebration(type, breakthrough), 2500);
  } else if (breakthrough) {
    setTimeout(() => showBreakthroughCelebration(type, breakthrough), 1500);
  }

  saveState();
  return p.skills[type];
}

// Kies vragen op basis van vaardigheid — inclusief Expert en Titan niveau
function getAdaptiveWords(playerIdx, worldIdx) {
  // worldIdx is already 0-9 (relative to planet)
  const p = state.players[playerIdx];
  const skill = (p.skills||{}).spell || 50;
  const allWords = WORDS_BY_WORLD[playerIdx]?.[worldIdx % 10] || WORDS_BY_WORLD[playerIdx]?.[0] || [];

  if (skill < 35)  return allWords.slice(0, 3);   // Oefenen
  if (skill < 65)  return allWords;                // Standaard
  if (skill < 100) return allWords.slice(3);       // Moeilijk

  // Expert (100-110): gebruik moeilijkste woorden + voeg dt-regel/verdubbeling toe
  if (skill < 110) return [...allWords.slice(3), ...getExpertWords(playerIdx)];

  // Titan (110+): alleen Expert woorden, sneller en complexer
  return getExpertWords(playerIdx);
}

function getExpertWords(playerIdx) {

  const expertGroep4 = [

function getAdaptiveMath(playerIdx, worldIdx) {
  const p = state.players[playerIdx];
  const skill = (p.skills||{}).math || 50;
  const noDivision = p.noDivision !== false;

  // Groep 1: alleen tellen en optellen t/m 10
  if (isGrade1(playerIdx)) {
    return [
      {q:'1 + 1 = ?', a:2, opts:[1,2,3,4]},
      {q:'2 + 1 = ?', a:3, opts:[2,3,4,5]},
      {q:'3 + 2 = ?', a:5, opts:[4,5,6,3]},
      {q:'5 - 2 = ?', a:3, opts:[2,3,4,5]},
      {q:'4 + 3 = ?', a:7, opts:[6,7,8,5]},
      {q:'6 - 3 = ?', a:3, opts:[2,3,4,5]},
      {q:'2 + 2 = ?', a:4, opts:[3,4,5,2]},
      {q:'7 - 4 = ?', a:3, opts:[2,3,4,5]},
    ].sort(()=>Math.random()-0.5);

  const allMath = MATH_BY_WORLD[playerIdx][worldIdx % 10];

  if (skill < 110) return [...allMath.slice(2), ...getExpertMath(playerIdx, noDivision)];

  // Titan niveau
  return getExpertMath(playerIdx, noDivision);
}

function getExpertMath(playerIdx, noDivision) {
  const isGroep4 = playerIdx === 0;
  if (isGroep4) {

        {q:'72 ÷ 8 = ?', a:9, opts:[9,8,7,6]},

// Voortgangsrapportje voor kind
function getSkillFeedback(playerIdx) {
  const p = state.players[playerIdx];
  const defaultFb = { msg:'', correctCount:0, avgMs:0, spellTrend:0, mathTrend:0, spell:5, math:5, lang:5 };
  if (!p || !p.skills) return defaultFb;
  const recent = (p.history||[]).slice(-10);
  const correctCount = recent.filter(r=>r.correct).length;
  const avgMs = recent.length ? Math.round(recent.reduce((s,r)=>s+r.ms,0)/recent.length/1000) : 0;

  let msg = '';
  if (correctCount >= 8) msg = '🌟 Je bent super snel aan het leren!';
  else if (correctCount >= 5) msg = '📈 Je gaat goed vooruit!';
  else if (correctCount < 3 && recent.length >= 5) msg = '💪 Blijf oefenen, je komt er!';

  const spellTrend = getSkillTrend(p.history, 'spell');
  const mathTrend  = getSkillTrend(p.history, 'math');
  return { msg, correctCount, avgMs, spellTrend, mathTrend,
           spell: Math.round(((p.skills.spell||50)/120)*12*10)/10,
           math:  Math.round(((p.skills.math||50)/120)*12*10)/10,
           lang:  Math.round(((p.skills.lang||50)/120)*12*10)/10 };
}

function getSkillTrend(history, type) {
  const recent = (history||[]).filter(h=>h.type===type).slice(-5);
  if (recent.length < 2) return 'nieuw';
  const avg = recent.reduce((s,r)=>s+r.delta,0) / recent.length;
  return avg > 1 ? '📈 stijgend' : avg < -1 ? '📉 oefenen' : '➡️ stabiel';
}

// Kies een taalchallenge op basis van level en vaardigheid
function pickLangChallenge(playerIdx) {
  const p = state.players[playerIdx];
  const skill = (p.skills||{}).lang || 50;
  const lvl = skill < 35 ? 1 : skill < 65 ? 2 : 3;
  const candidates = LANG_CHALLENGES.filter(c => c.level <= lvl);
  const done = p.history ? p.history.filter(h=>h.type==='lang').map(h=>h.id) : [];
  const fresh = candidates.filter(c => !done.includes(c.id));
  const pool = fresh.length > 0 ? fresh : candidates;
  return pool[Math.floor(Math.random() * pool.length)];
}

// Controleer of een bonus challenge moet verschijnen

  const p = getPlayer();
  if (!p.bonusDue) p.bonusDue = 0;
  if (p.bonusDue > 0 && p.bonusDue % 3 === 0) {
    return true;
  }
  return false;
}

function showCoinSpin(reward) {
  const bonus = [reward, reward*2, Math.floor(reward*1.5), Math.floor(reward*0.5), reward+5, reward+10];
  let spinIdx = 0;
  let spinning = true;
  let spinCount = 0;

  const box = document.getElementById('challenge-content');
  box.innerHTML = `
    <div style="text-align:center">
      <div style="font-size:3rem">🎰</div>
      <div style="font-family:Fredoka One,cursive;font-size:1.4rem;color:var(--purple);margin:8px 0">Muntjes Wiel!</div>
      <div style="font-size:4rem;margin:16px 0" id="spin-display">🪙</div>
      <div style="font-family:Fredoka One,cursive;font-size:2rem;color:var(--coin)" id="spin-coins">?</div>
      <div style="margin-top:16px;font-size:0.9rem;color:#888" id="spin-hint">Tik om te stoppen!</div>
      <button class="btn-primary" id="spin-btn" onclick="stopSpin()" style="margin-top:12px">🎰 Stop!</button>
    </div>`;

  function doSpin() {
    if (!spinning) return;
    spinIdx = (spinIdx + 1) % bonus.length;
    const el = document.getElementById('spin-coins');
    if (el) el.textContent = '🪙 ' + bonus[spinIdx];
    spinCount++;
    const delay = spinCount < 10 ? 80 : spinCount < 20 ? 120 : 200;
    setTimeout(doSpin, delay);
  }
  doSpin();

  window._spinBonus = bonus;
  window._spinIdx = () => spinIdx;
  window._stopSpinFn = () => { spinning = false; };
}

function stopSpin() {
  if (window._stopSpinFn) window._stopSpinFn();
  const coins = window._spinBonus[window._spinIdx()];
  sfxCoins(coins);
  const el = document.getElementById('spin-hint');
  if (el) el.textContent = `🎉 Je wint ${coins} muntjes!`;
  const btn = document.getElementById('spin-btn');
  if (btn) { btn.textContent = 'CLAIM TITAN COINS! 🎁'; btn.onclick = () => { closeChallenge(); completeChallenge(coins, coins >= 20); }; }
}

      showToast('Tijd op! ⏱️', true);
    }

function checkSpeed(btn, answer, correct, reward) {
  clearInterval(speedTimer);
  const ms = Date.now() - challengeStartTime;
  const btns = document.querySelectorAll('.math-btn');
  btns.forEach(b => b.onclick = null);
  if (answer === correct) {
    btn.classList.add('correct-ans');
    const speedBonus = ms < 3000 ? reward * 2 : reward; // dubbel als onder 3 sec!
    sfxPerfect();
    recordAnswer('math', true, ms);
    closeChallenge();
    completeChallenge(speedBonus, ms < 3000);
    if (ms < 3000) showToast('⚡ BEAST MODE! Dubbele Titan Coins!');
  } else {
    btn.classList.add('wrong-ans');
    sfxWrong();
    recordAnswer('math', false, ms);
    closeChallenge();
    showToast(`Het antwoord was ${correct}`, true);
  }
}

function startMemoryInput(reward) {
  memoryPhase = 'input';
  memoryInput = [];

  const box = document.getElementById('challenge-content');

    </div>`;

function memoryTap(emoji, reward) {
  memoryInput.push(emoji);
  const disp = document.getElementById('mem-input-display');
  if (disp) disp.textContent = memoryInput.join('');

  if (memoryInput.length === memorySequence.length) {
    const correct = memoryInput.join('') === memorySequence.join('');
    if (correct) {
      sfxPerfect();
      recordAnswer('spell', true, 5000);
      closeChallenge();
      completeChallenge(reward, true);
    } else {
      sfxWrong();
      showToast(`Het was: ${memorySequence.join('')}`, true);
      setTimeout(() => { closeChallenge(); completeChallenge(Math.floor(reward/3), false); }, 1800);
    }
  }
}

  else if (skills.math < 35) improvements.push('🧠 Titan Brain');

function getDetailedTrend(history) {
  if (history.length < 4) return null;
  const recent = history.slice(-5);
  const older  = history.slice(-10, -5);
  if (older.length < 2) return null;
  const recentAcc = recent.filter(h=>h.correct).length / recent.length;
  const olderAcc  = older.filter(h=>h.correct).length  / older.length;
  const diff = recentAcc - olderAcc;
  if (diff > 0.15) return '📈 verbeterd';
  if (diff < -0.15) return '📉 let op';
  return '➡️ stabiel';
}

function checkStaal(btn, answer, correct, reward) {
  const btns = document.querySelectorAll('.math-btn');
  btns.forEach(b => b.onclick = null);
  const ms = Date.now() - challengeStartTime;
  if (answer === correct) {
    btn.classList.add('correct-ans');
    sfxPerfect();
    recordAnswer('spell', true, ms);
    closeChallenge();
    completeChallenge(reward, ms < 5000);
  } else {
    btn.classList.add('wrong-ans');
    sfxWrong();
    recordAnswer('spell', false, ms);
    btns.forEach(b => { if (b.textContent.trim() === correct) b.classList.add('correct-ans'); });
    setTimeout(() => { closeChallenge(); completeChallenge(Math.floor(reward/3), false); }, 1800);
  }
}

let bossQuestions = [];
let bossIdx = 0;
let bossScore = 0;
let bossTotal = 5;

function showBossBattle(worldIdx) {
  const p = getPlayer();
  const world = WORLDS[Math.min(worldIdx, WORLDS.length-1)];

  // Maak gemengde vragenset: spell + math + staal + verrassing
  const words = getAdaptiveWords(state.currentPlayer, worldIdx % 10);
  const maths = getAdaptiveMath(state.currentPlayer, worldIdx % 10);
  const staalPool = state.currentPlayer === 0 ? STAAL_CHALLENGES.groep4 : STAAL_CHALLENGES.groep2;

  bossQuestions = [
    { type:'spell', word: words[Math.floor(Math.random()*words.length)] },
    { type:'math',  math: maths[Math.floor(Math.random()*maths.length)] },
    { type:'staal', q: staalPool[Math.floor(Math.random()*staalPool.length)] },
    { type:'math',  math: maths[Math.floor(Math.random()*maths.length)] },
    { type:'spell', word: words[Math.floor(Math.random()*words.length)] },
  ];
  bossIdx = 0; bossScore = 0; bossTotal = bossQuestions.length;

  showBossQuestion(world);
}

function checkBossSpell(correct) {
  const input = document.getElementById('boss-spell');

    showBossCorrect();
  } else {
    sfxWrong();
    showBossWrong(`Het woord was: ${correct}`);

function checkBossMath(btn, answer, correct) {

    btn.classList.add('correct-ans'); bossScore++; sfxCorrect();

function checkBossStaal(btn, answer, correct) {

function checkAndAwardBadges() {
  const p = getPlayer();
  if (!p.badges) p.badges = [];
  if (!p.streakData) p.streakData = { lastDate: null, streak: 0, totalDays: 0 };

  const today = new Date().toDateString();
  const sd = p.streakData;

  // Update streak
  if (sd.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (sd.lastDate === yesterday) {
      sd.streak = (sd.streak||0) + 1;
    } else if (sd.lastDate !== today) {
      sd.streak = 1;
    }
    sd.lastDate = today;
    sd.totalDays = (sd.totalDays||0) + 1;
  }

  const newBadges = [];
  BADGES.forEach(b => {
    if (p.badges.includes(b.id)) return;
    let earned = false;
    if (b.req    && sd.streak >= b.req)           earned = true;
    if (b.level  && (p.level||0) >= b.level)      earned = true;
    if (b.perfect && (p.perfectCount||0) >= b.perfect) earned = true;
    if (b.coins  && (p.totalCoinsEarned||0) >= b.coins) earned = true;
    if (b.worlds && Math.floor((p.level||0)/5) >= b.worlds) earned = true;
    if (b.staal  && (p.staalCount||0) >= b.staal) earned = true;
    if (earned) { p.badges.push(b.id); newBadges.push(b); }
  });

  if (newBadges.length > 0) {
    saveState();
    setTimeout(() => showNewBadges(newBadges), 1000);
  }
}

function startMission(missionId) {
  const m = getMissions().find(x => x.id === missionId);
  if (!m) return;
  const p = getPlayer();
  const today = new Date().toDateString();

  if (m.freeItem) {
    // Compliment — direct belonen
    completeMission(missionId);
    return;
  }

  if (!m.needsApproval) {
    // Geen goedkeuring nodig — direct
    const box = document.getElementById('challenge-content');
    box.innerHTML = `
      <div style="text-align:center;padding:10px">
        <div style="font-size:3rem">${m.emoji}</div>
        <div style="font-family:Fredoka One,cursive;font-size:1.3rem;color:#f5a623">${m.title}</div>
        <div style="font-size:0.9rem;color:rgba(255,255,255,0.7);margin:10px 0">${m.desc}</div>
        <div style="font-family:Fredoka One,cursive;font-size:1rem;color:#57c785;margin-bottom:16px">
          🪙 +${m.reward} Titan Coins wacht op je!
        </div>
        <button class="btn-primary" onclick="completeMission('${missionId}')">

        </button>
        <br><button class="btn-secondary" onclick="closeChallenge()" style="margin-top:8px">Nog niet</button>
      </div>`;
    document.getElementById('challenge-modal').classList.add('open');
  } else {
    // Ouder goedkeuring nodig
    if (!p.pendingMissions) p.pendingMissions = {};
    p.pendingMissions[missionId] = today;
    saveState();
    renderWallet();
    showToast(`${m.emoji} Missie gestart! Vraag een ouder om goed te keuren in het HQ!`);
  }
}

function completeMission(missionId) {
  const m = getMissions().find(x => x.id === missionId);
  if (!m) return;
  const p = getPlayer();
  const today = new Date().toDateString();
  if (!p.completedMissions) p.completedMissions = {};
  p.completedMissions[missionId] = today;
  if (p.pendingMissions) delete p.pendingMissions[missionId];

  sfxLevelUp();
  closeChallenge();
  addCoins(m.reward);
  saveState();
  renderWallet();

  if (m.freeItem) {
    showToast(`💛 Compliment gegeven! +${m.reward} coins & een verrassing in de winkel!`);
    // Geef gratis willekeurig shop item
    grantFreeItem();
  } else {
    showToast(`${m.emoji} ${m.title} gedaan! +${m.reward} Titan Coins! BOOYAH!`);
  }
  checkAndAwardBadges();
}

function grantFreeItem() {
  const allItems = getShopItems(state.currentPlayer);
  const owned = state.ownedItems[state.currentPlayer] || [];
  const available = allItems.filter(it => !owned.includes(it.id) && !it.locked);
  if (available.length === 0) return;
  const item = available[Math.floor(Math.random() * Math.min(available.length, 10))];
  state.ownedItems[state.currentPlayer] = [...owned, item.id];
  saveState();
  showToast(`🎁 Gratis item: ${item.emoji} ${item.name}!`);
}

// Parent approvalmission
function approveParentMission(playerIdx, missionId) {
  const p = state.players[playerIdx];
  if (!p.pendingMissions || !p.pendingMissions[missionId]) {
    showToast('Geen wachtende missie gevonden', true);
    return;
  }
  const prevPlayer = state.currentPlayer;
  state.currentPlayer = playerIdx;
  completeMission(missionId);
  state.currentPlayer = prevPlayer;
  renderParentReport();
  showToast('✅ Missie goedgekeurd! Coins uitbetaald!');
}

    _sessionStart = Date.now();
    showToast('✅ Tijdslimiet gereset voor vandaag!');
    renderParentReport();
  } catch(e) {}
}

function rejectMission(playerIdx, missionId) {
  const p = state.players[playerIdx];
  if (p.pendingMissions) delete p.pendingMissions[missionId];
  saveState();
  renderParentReport();
  showToast('❌ Missie afgewezen');
}

function addCustomMission() {
  const title  = document.getElementById('custom-mission-title')?.value?.trim();
  const desc   = document.getElementById('custom-mission-desc')?.value?.trim();
  const reward = parseInt(document.getElementById('custom-mission-reward')?.value||'15');
  const emoji  = document.getElementById('custom-mission-emoji')?.value||'🧹';
  if (!title) { showToast('Vul een naam in!', true); return; }
  if (!state.customMissions) state.customMissions = [];
  const id = 'custom_' + Date.now();
  state.customMissions.push({ id, title, desc:desc||title, reward, emoji, needsApproval:true });
  saveState();
  renderParentReport();
  showToast(`${emoji} Klusje "${title}" toegevoegd!`);
}

function removeCustomMission(idx) {
  if (!state.customMissions) return;
  state.customMissions.splice(idx, 1);
  saveState();
  renderParentReport();
}

const PARENT_PIN_KEY = 'tp_parent_pin';
const BIOMETRIC_KEY  = 'tp_biometric_setup';

function getParentPin() {
  try { return localStorage.getItem(PARENT_PIN_KEY); } catch(e) { return null; }
}
function setParentPin(pin) {
  try { localStorage.setItem(PARENT_PIN_KEY, pin); } catch(e) {}
}
function isBiometricSetup() {
  try { return localStorage.getItem(BIOMETRIC_KEY) === '1'; } catch(e) { return false; }
}
function setBiometricSetup(v) {
  try { localStorage.setItem(BIOMETRIC_KEY, v ? '1' : '0'); } catch(e) {}
}

// Check of Web Authentication API beschikbaar is
function hasBiometrics() {
  return !!(window.PublicKeyCredential &&
    typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function');
}

async function biometricAvailable() {
  try {
    if (!hasBiometrics()) return false;
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  } catch(e) { return false; }
}

// Toon het slot scherm
async function showParentLock() {
  const modal = document.getElementById('parent-lock-modal');
  const inner = document.getElementById('parent-lock-inner');
  modal.classList.add('open');

  const hasPin    = !!getParentPin();
  const bioSetup  = isBiometricSetup();
  const bioAvail  = await biometricAvailable();

  if (!hasPin) {
    // Eerste keer: stel PIN in (+ optioneel Face ID)
    renderSetupScreen(inner, bioAvail);
  } else if (bioSetup && bioAvail) {
    // Face ID / Touch ID beschikbaar en ingesteld
    renderBiometricScreen(inner);
    setTimeout(() => triggerBiometric(), 300);
  } else {
    // PIN invoer
    renderPinScreen(inner, false);
  }
}

function renderNumpad(action) {
  const keys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto">
    ${keys.map(k => k === '' ? '<div></div>' : `
      <button onclick="numpadTap('${k}','${action}')"
        style="padding:14px 0;font-family:Fredoka One,cursive;font-size:1.4rem;
        background:#1a2744;color:${k==='⌫'?'#e94560':'#f5a623'};
        border:1px solid rgba(245,166,35,0.2);border-radius:12px;cursor:pointer;
        transition:all 0.1s;active:background:#0f3460"
        onmousedown="this.style.background='#0f3460'"
        onmouseup="this.style.background='#1a2744'"
        ontouchstart="this.style.background='#0f3460'"
        ontouchend="this.style.background='#1a2744'">${k}</button>`
    ).join('')}
  </div>`;
}

// ===== NUMPAD TAP HANDLER =====
function numpadTap(key, action) {
  if (action === 'setupPin') {
    if (key === '⌫') {
      window._setupPin = (window._setupPin||'').slice(0,-1);
    } else if ((window._setupPin||'').length < 4) {
      window._setupPin = (window._setupPin||'') + key;
    }
    updatePinDisplay(window._setupPin);
    if ((window._setupPin||'').length === 4) {
      setTimeout(() => handleSetupPin(), 200);
    }
  } else if (action === 'checkPin') {
    if (key === '⌫') {
      window._enteredPin = (window._enteredPin||'').slice(0,-1);
    } else if ((window._enteredPin||'').length < 4) {
      window._enteredPin = (window._enteredPin||'') + key;
    }
    updatePinDisplay(window._enteredPin);
    if ((window._enteredPin||'').length === 4) {
      setTimeout(() => handleCheckPin(), 200);
    }
  }
}

function updatePinDisplay(pin) {
  const disp = document.getElementById('pin-display');
  if (!disp) return;
  const filled = (pin||'').length;
  disp.textContent = '●'.repeat(filled) + '–'.repeat(4-filled);
}

// ===== SETUP PIN LOGICA =====
function handleSetupPin() {
  const err = document.getElementById('setup-error');
  if (window._setupPhase === 'first') {
    // Sla op en vraag bevestiging
    window._setupPinFirst = window._setupPin;
    window._setupPin = '';
    updatePinDisplay('');
    if (err) err.textContent = '';
    const disp = document.getElementById('pin-display');
    if (disp) disp.textContent = '––––';
    // Verander tekst
    const inner = document.getElementById('parent-lock-inner');
    const title = inner?.querySelector('[style*="1.3rem"]');
    if (title) title.textContent = 'Bevestig je PIN';
    window._setupPhase = 'confirm';
  } else {
    // Bevestiging
    if (window._setupPin === window._setupPinFirst) {
      setParentPin(window._setupPin);
      closeParentLock();
      // Stel ook biometrie in als beschikbaar
      biometricAvailable().then(avail => {
        if (avail) offerBiometricSetup();
        else {
          showToast('✅ PIN ingesteld! Ouder toegang beveiligd.');
          navigate('parent');
        }
      });
    } else {
      if (err) err.textContent = '❌ PINs komen niet overeen. Probeer opnieuw.';
      window._setupPin = '';
      window._setupPinFirst = '';
      window._setupPhase = 'first';
      updatePinDisplay('');
      const inner = document.getElementById('parent-lock-inner');
      const title = inner?.querySelector('[style*="1.3rem"]');
      if (title) title.textContent = 'Kies een PIN';
    }
  }
}

function handleCheckPin() {
  const err = document.getElementById('pin-error');
  if (window._enteredPin === getParentPin()) {
    closeParentLock();
    // Toon admin tab als admin — altijd bij ontgrendelen
    const reg = getRegistration();
    if (reg?.admin) {
      document.getElementById('nav-admin')?.style.setProperty('display','flex');
    }
    navigate('parent');
  } else {
    sfxWrong();
    if (err) err.textContent = '❌ Onjuiste PIN';
    window._enteredPin = '';
    updatePinDisplay('');
    setTimeout(() => { if(err) err.textContent = ''; }, 2000);
  }
}

// ===== BIOMETRIE =====
async function triggerBiometric() {
  const status = document.getElementById('bio-status');
  if (status) status.textContent = 'Bezig...';

  try {
    // Gebruik de Web Authentication API voor platform authenticator (Face ID / Touch ID)
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);

    const credential = await navigator.credentials.get({
      publicKey: {
        challenge,
        timeout: 60000,
        userVerification: 'required', // verplicht Face ID / Touch ID
        rpId: window.location.hostname || 'localhost',
        allowCredentials: [] // laat browser zelf kiezen
      }
    });

    if (credential) {
      // Authenticatie geslaagd!
      closeParentLock();
      // Toon admin tab als admin
      const reg = getRegistration();
      if (reg?.admin) {
        document.getElementById('nav-admin')?.style.setProperty('display','flex');
      }
      navigate('parent');
    }
  } catch(e) {
    // Mislukt of geannuleerd
    if (e.name === 'NotAllowedError') {
      if (status) status.textContent = '❌ Geannuleerd. Probeer opnieuw.';
    } else if (e.name === 'InvalidStateError' || e.name === 'NotSupportedError') {
      // Nog niet geregistreerd — val terug op PIN
      if (status) status.textContent = 'Face ID niet beschikbaar.';
      setTimeout(() => {
        setBiometricSetup(false);
        renderPinScreen(document.getElementById('parent-lock-inner'), false);
      }, 1000);
    } else {
      if (status) status.textContent = 'Gebruik PIN in plaats daarvan.';
      setTimeout(() => renderPinScreen(document.getElementById('parent-lock-inner'), false), 1200);
    }
  }
}

async function offerBiometricSetup() {
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;
    background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center`;
  overlay.innerHTML = `
    <div style="background:#1a1a2e;border-radius:24px;padding:24px;max-width:320px;width:92%;
      text-align:center;border:2px solid #f5a623">
      <div style="font-size:3rem;margin-bottom:8px">${/ipad|iphone|ipod/i.test(navigator.userAgent)?'👤':'🔏'}</div>
      <div style="font-family:Fredoka One,cursive;font-size:1.3rem;color:#f5a623;margin-bottom:6px">
        Face ID inschakelen?
      </div>
      <div style="font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:20px">
        Gebruik Face ID of Touch ID voor nog snellere toegang. Eenmalig instellen.
      </div>
      <button onclick="setupBiometric(this.parentElement.parentElement)"
        style="width:100%;padding:14px;background:linear-gradient(135deg,#f5a623,#e94560);
        color:white;border:none;border-radius:14px;font-family:Fredoka One,cursive;
        font-size:1rem;cursor:pointer;margin-bottom:8px">
        👤 Ja, Face ID instellen
      </button>
      <button onclick="this.parentElement.parentElement.remove();navigate('parent')"
        style="width:100%;padding:12px;background:none;border:1px solid rgba(255,255,255,0.2);
        border-radius:14px;color:rgba(255,255,255,0.5);font-family:Fredoka One,cursive;
        font-size:0.9rem;cursor:pointer">
        Niet nu, alleen PIN
      </button>
    </div>`;
  document.body.appendChild(overlay);
}

async function setupBiometric(overlay) {
  overlay?.remove();
  try {
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const userId = new Uint8Array(16);
    crypto.getRandomValues(userId);

    await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'TitansPad', id: window.location.hostname || 'localhost' },
        user: { id: userId, name: 'ouder', displayName: 'Ouder' },
        pubKeyCredParams: [{ alg: -7, type: 'public-key' }],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required'
        },
        timeout: 60000,
      }
    });

    setBiometricSetup(true);
    showToast('✅ Face ID ingesteld!');
    navigate('parent');
  } catch(e) {
    showToast('Face ID instellen mislukt — gebruik je PIN.', true);
    navigate('parent');
  }
}

function resetParentPin() {
  if (confirm('Wil je de PIN resetten? Je moet dan een nieuwe PIN instellen.')) {
    setParentPin(null);
    setBiometricSetup(false);
    try { localStorage.removeItem(PARENT_PIN_KEY); } catch(e) {}
    showParentLock();
  }
}

function closeParentLock() {
  document.getElementById('parent-lock-modal').classList.remove('open');
}

// Tijdslimiet per kind — slaat op per speler index + datum
function getUsedTimeToday(playerIdx) {
  try {
    const pid = playerIdx !== undefined ? playerIdx : state.currentPlayer;
    const d = JSON.parse(localStorage.getItem('tp_time_used') || '{}');
    const today = new Date().toDateString();
    const key = `${pid}_${today}`;
    return d[key] || 0;
  } catch(e) { return 0; }
}

function saveUsedTime(minutes, playerIdx) {
  try {
    const pid = playerIdx !== undefined ? playerIdx : state.currentPlayer;
    const d = JSON.parse(localStorage.getItem('tp_time_used') || '{}');
    const today = new Date().toDateString();
    const key = `${pid}_${today}`;
    d[key] = minutes;
    // Verwijder data ouder dan 7 dagen
    Object.keys(d).forEach(k => {
      const datePart = k.split('_').slice(1).join('_');
      if (datePart && new Date(datePart) < new Date(Date.now() - 7*86400000)) delete d[k];
    });
    localStorage.setItem('tp_time_used', JSON.stringify(d));
  } catch(e) {}
}

// Bereken aantal draaibeurten op basis van recente prestaties
function getWheelSpins() {
  const p = getPlayer();
  const history = (p.history||[]).slice(-10);
  if (history.length === 0) return 1;
  const correct = history.filter(h=>h.correct).length;
  const pct = correct / history.length;
  // < 50% = 1 beurt, 50-80% = 2 beurten, > 80% = 3 beurten
  if (pct >= 0.8) return 3;
  if (pct >= 0.5) return 2;
  return 1;
}

function wheelDraw(angle, prizes) {
  const canvas = document.getElementById('wheel-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 110, cy = 110, r = 105;
  const seg = (Math.PI * 2) / prizes.length;
  ctx.clearRect(0, 0, 220, 220);

  prizes.forEach((p, i) => {
    const start = angle + i * seg;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + seg);
    ctx.closePath();
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = '#0d0d1a';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + seg / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'white';
    ctx.font = 'bold 10px sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 3;
    ctx.fillText(p.label, r - 5, 4);
    ctx.restore();
  });

  // Middencirkel
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = '#0d0d1a';
  ctx.fill();
  ctx.strokeStyle = '#f5a623';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#f5a623';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚡', cx, cy);
  ctx.textBaseline = 'alphabetic';
}

function wheelBtnTap(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const w = window._wheel;
  if (!w || w.spinning) return;
  if (w.spinsLeft <= 0) { wheelClaimAll(); return; }

  w.spinning = true;
  sfxBonus();

  const btn = document.getElementById('wheel-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Draait...'; }

  const segCount = w.prizes.length;
  const segAngle = (Math.PI * 2) / segCount;
  const winIdx = Math.floor(Math.random() * segCount);
  const extraRounds = 4 + Math.floor(Math.random() * 4);
  const startAngle = w.angle;
  const targetAngle = startAngle + (extraRounds * Math.PI * 2) + (winIdx * segAngle) + (segAngle * 0.5);
  const duration = 3500;
  const startTime = performance.now();

  // Failsafe timeout
  const failsafe = setTimeout(() => {
    if (w.spinning) {
      w.spinning = false;
      w.angle = targetAngle;
      wheelFinishSpin(w, winIdx);
    }
  }, 5000);

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    w.angle = startAngle + (targetAngle - startAngle) * ease;
    wheelDraw(w.angle, w.prizes);

    if (progress < 1) {
      w.rafId = requestAnimationFrame(animate);
    } else {
      clearTimeout(failsafe);
      w.spinning = false;
      w.angle = targetAngle;
      wheelFinishSpin(w, winIdx);
    }
  }
  w.rafId = requestAnimationFrame(animate);
}

function wheelFinishSpin(w, winIdx) {
  const prize = w.prizes[winIdx];
  w.spinsLeft--;
  w.totalCoins += prize.coins;
  w.winHistory.push(prize.label);
  sfxLevelUp();

  // Update UI
  const res = document.getElementById('wheel-result');
  if (res) {
    if (w.spinsLeft > 0) {
      res.innerHTML = `🎉 <strong>${prize.label}</strong>! Totaal: ${w.totalCoins} 🪙`;
    } else {
      res.innerHTML = `🎉 <strong>${prize.label}</strong>! Totaal: <strong>${w.totalCoins} coins</strong>!`;
    }
  }

  const spinEl = document.getElementById('wheel-spins-left');
  if (spinEl) spinEl.innerHTML = `Beurten over: <strong style="color:#f5a623">${w.spinsLeft}</strong>`;

  const btn = document.getElementById('wheel-btn');
  const claimBtn = document.getElementById('wheel-claim-btn');

  if (w.spinsLeft > 0) {
    // Nog beurten over
    if (btn) { btn.disabled = false; btn.textContent = `🎡 Nog ${w.spinsLeft}x draaien!`; }
  } else {
    // Geen beurten meer → toon claim knop
    if (btn) { btn.style.display = 'none'; }
    if (claimBtn) { claimBtn.style.display = 'inline-block'; }
    if (spinEl) spinEl.innerHTML = `<span style="color:#57c785">✅ Alle beurten gebruikt!</span>`;
    sfxPerfect();
  }
}

function wheelClaimAll(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const w = window._wheel;
  if (!w) return;
  // Voorkom dubbele claim
  if (w.claimed) return;
  w.claimed = true;

  const total = w.totalCoins || 0;
  const spinsUsed = (w.spinsTotal || 1) - (w.spinsLeft || 0);
  const perfect = w.spinsTotal >= 3 && total >= 30;

  // Sluit modal EN voltooi het level correct
  document.getElementById('reward-modal')?.classList.remove('open');
  document.getElementById('challenge-modal')?.classList.remove('open');
  bStopGame?.();

  // Voeg coins toe en voltooi level
  if (total > 0) {
    addCoins(total);
    showToast(`🎡 +${total} coins gewonnen! BOOYAH!`);
    sfxLevelUp();
  }

  // Markeer level als voltooid zodat je verder kunt
  completeChallenge(0, perfect); // 0 extra coins want al via addCoins gedaan
}

// 5b. MEMORY KAARTJES (2 of a kind)
let memCards = [], memFlipped = [], memMatched = [], memMoves = 0;

function memCloseChallenge() { if(window._memTimeout)clearTimeout(window._memTimeout); closeChallenge(); }

function showMemoryCards() {
  // Progressie: minder paren = makkelijker, meer paren = moeilijker
  const perf = getWheelSpins(); // hergebruik prestatie-berekening
  const pairCount = perf >= 3 ? 8 : perf >= 2 ? 6 : 4;
  const emojis = ['🦁','🐯','🐉','⭐','🚀','🦄','🔥','💎','🌈','🐙'];
  const pairs = [...emojis.slice(0,pairCount), ...emojis.slice(0,pairCount)];
  memCards = shuffleArr(pairs);
  memFlipped = [];
  memMatched = [];
  memMoves = 0;
  window._memPairCount = pairCount;
  window._memStartTime = Date.now();
  // Timeout: max 90 seconden
  if (window._memTimeout) clearTimeout(window._memTimeout);
  window._memTimeout = setTimeout(() => {
    if (document.getElementById('mem-grid')) {
      const earned = Math.max(2, Math.floor(memMatched.length / 2) * 3);
      addCoins(earned);
      showToast(`⏰ Tijd! ${memMatched.length/2} paren gevonden. +${earned} coins`);
      completeChallenge(0, false);
    }
  }, 90000);
  renderMemoryCards();
}

function renderMemoryCards() {
  const box = document.getElementById('challenge-content');
  box.innerHTML = `
    <div style="text-align:center">
      <div style="font-family:Fredoka One,cursive;color:#f5a623;font-size:1.1rem;margin-bottom:4px">
        🃏 2 of a Kind!
      </div>
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:10px">
        Zetten: ${memMoves} · Gevonden: ${memMatched.length/2}/8
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:280px;margin:0 auto 12px" id="mem-grid">
        ${memCards.map((e,i) => `
          <div onclick="flipMemCard(${i})" id="mc-${i}"
            style="width:58px;height:58px;border-radius:12px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;font-size:1.6rem;
            background:${memMatched.includes(i)?'#0f3060':memFlipped.includes(i)?'#1a3a6e':'#1a2744'};
            border:2px solid ${memMatched.includes(i)?'#57c785':memFlipped.includes(i)?'#f5a623':'rgba(255,255,255,0.1)'};
            transition:all 0.2s">
            ${memMatched.includes(i)||memFlipped.includes(i)?e:'❓'}
          </div>`).join('')}
      </div>
      <button onclick="memCloseChallenge()" class="btn-secondary">← Terug</button>
    </div>`;
}

function flipMemCard(idx) {
  if (memFlipped.length >= 2) return;
  if (memFlipped.includes(idx) || memMatched.includes(idx)) return;
  memFlipped.push(idx);
  sfxClick();
  renderMemoryCards();

  if (memFlipped.length === 2) {
    memMoves++;
    const [a, b] = memFlipped;
    if (memCards[a] === memCards[b]) {
      memMatched.push(a, b);
      memFlipped = [];
      sfxCorrect();
      if (memMatched.length === memCards.length) {
        if (window._memTimeout) clearTimeout(window._memTimeout);
        const timeSec = Math.floor((Date.now() - (window._memStartTime||Date.now())) / 1000);
        const reward = Math.max(5, 40 - memMoves - Math.floor(timeSec/10));
        setTimeout(() => {
          sfxLevelUp();
          addCoins(reward);
          showToast(`🃏 Gewonnen in ${memMoves} zetten (${timeSec}s)! +${reward} coins!`);
          completeChallenge(0, memMoves <= 10);
        }, 500);
      } else {
        setTimeout(renderMemoryCards, 300);
      }
    } else {
      setTimeout(() => { memFlipped = []; renderMemoryCards(); }, 900);
    }
  }
}

function spawnBallons() {
  const area = document.getElementById('bp-area');
  if (!area || bPrikTime <= 0) return;
  const colors = ['#e94560','#f5a623','#57c785','#ce93d8','#90caf9','#ff69b4'];
  const b = document.createElement('div');
  const x = 10 + Math.random() * 75;
  const size = 40 + Math.random() * 25;
  b.style.cssText = `position:absolute;left:${x}%;bottom:-60px;width:${size}px;height:${size}px;
    border-radius:50%;background:${colors[Math.floor(Math.random()*colors.length)]};

    transition:bottom 0.1s;user-select:none;-webkit-user-select:none;
    animation:float-up ${2+Math.random()*2}s linear forwards`;
  b.textContent = '🎈';
  b.addEventListener('click', () => {
    bPrikScore++;
    const sc = document.getElementById('bp-score');
    if (sc) sc.textContent = bPrikScore;
    sfxCorrect();
    b.style.transform = 'scale(1.5)';
    b.style.opacity = '0';
    setTimeout(() => b.remove(), 200);
  });
  area.appendChild(b);
  // Float up animation via JS
  let bottom = -60;
  const rise = setInterval(() => {
    if (!document.contains(b) || bPrikTime <= 0) { clearInterval(rise); return; }
    bottom += 2;
    b.style.bottom = bottom + 'px';
    if (bottom > 320) { b.remove(); clearInterval(rise); }
  }, 30);
  if (bPrikTime > 0) setTimeout(spawnBallons, 600 + Math.random() * 800);
}

function stopBallonPrikken() {
  if (bPrikTimer) { clearInterval(bPrikTimer); bPrikTimer = null; }
  bPrikTime = 0; // stop alle spawnBallons recursie
  // Verwijder alle ballonnen
  const area = document.getElementById('bp-area');
  if (area) area.innerHTML = '';
}

function showTopoChallenge(playerIdx) {
  const isGroep4 = playerIdx === 0;
  const pool = isGroep4 ? [...TOPO_PROVINCIES, ...TOPO_EUROPA] : TOPO_PROVINCIES.slice(0,6);
  const q = pool[Math.floor(Math.random() * pool.length)];
  const wrong = shuffleArr(pool.filter(p=>p.name!==q.name)).slice(0,3).map(p=>p.name);
  const opts = shuffleArr([q.name, ...wrong]);
  const reward = 18;

  const box = document.getElementById('challenge-content');
  box.innerHTML = `
    <div style="text-align:center">
      <div style="font-size:3rem;margin-bottom:6px">${q.emoji}</div>
      <div style="font-family:Fredoka One,cursive;color:#f5a623;font-size:1rem;margin-bottom:4px">
        🗺️ Topografie
      </div>
      <div style="background:#0f3460;border-radius:14px;padding:12px;margin:8px 0;
        font-family:Fredoka One,cursive;font-size:1.1rem;color:white">
        ${q.hint}
      </div>
      <div style="font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:12px">
        Welke provincie/land is dit?
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${opts.map(o => `
          <button class="math-btn" onclick="checkTopo(this,'${o}','${q.name}',${reward})"
            style="font-size:0.9rem;padding:12px">${o}</button>`).join('')}
      </div>
      <button class="btn-secondary" onclick="closeChallenge()" style="margin-top:10px">← Terug</button>
    </div>`;
}

function checkTopo(btn, answer, correct, reward) {
  document.querySelectorAll('.math-btn').forEach(b=>b.onclick=null);
  const ms = Date.now() - (challengeStartTime||Date.now());
  if (answer === correct) {
    btn.classList.add('correct-ans'); sfxPerfect();
    recordAnswer('spell', true, ms);
    closeChallenge();
    completeChallenge(reward, ms < 5000);
  } else {
    btn.classList.add('wrong-ans'); sfxWrong();
    document.querySelectorAll('.math-btn').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('correct-ans');});
    recordAnswer('spell', false, ms);
    setTimeout(()=>{closeChallenge();completeChallenge(Math.floor(reward/3),false);},1500);
  }
}

      <button id="mopje-reveal"
        ontouchend="mopjeReveal()" onclick="mopjeReveal()"
        style="background:linear-gradient(135deg,#f5a623,#e94560);color:white;border:none;
        border-radius:12px;padding:10px 20px;font-family:Fredoka One,cursive;
        font-size:0.9rem;cursor:pointer;margin-bottom:10px;width:100%">

      <button

        style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);
        border-radius:12px;padding:8px 20px;color:rgba(255,255,255,0.6);

        Sluiten ✕
      </button>

  // Klik buiten de inner div = sluiten
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) sluitMopje();
  });
  overlay.addEventListener('touchend', (e) => {
    if (e.target === overlay) sluitMopje();
  });

  window._mopjeAntwoord = m.a;
  window._mopjeRevealed = false;

  document.body.appendChild(overlay);

  // Auto-sluiten na 30 seconden zodat het nooit vast blijft
  window._mopjeTO = setTimeout(() => sluitMopje(), 30000);

function mopjeReveal() {
  if (window._mopjeRevealed) return;
  window._mopjeRevealed = true;
  const v = document.getElementById('mopje-vraag');
  const btn = document.getElementById('mopje-reveal');
  if (v) v.textContent = window._mopjeAntwoord || '';
  if (btn) { btn.textContent = 'Haha! 😂'; btn.style.background = 'linear-gradient(135deg,#57c785,#2e7d32)'; }
  sfxCorrect();
}

function sluitMopje() {
  if (window._mopjeTO) clearTimeout(window._mopjeTO);
  document.getElementById('mopje-overlay')?.remove();
  document.getElementById('challenge-modal')?.classList.remove('open');
  document.getElementById('reward-modal')?.classList.remove('open');
  // Herlaad de kaart zodat het volgende level zichtbaar is
  if (document.getElementById('map-screen')?.classList.contains('active')) {
    renderMap();
  }
}

// Voltooi een level zonder reward modal (voor mopjes, etc.)
function advanceLevelSilently(coins) {
  const p = getPlayer();
  // Fix: gebruik planetBase zodat levels correct doorlopen op alle planeten
  const planetIdx = Math.min(Math.floor((p.level||0)/50), 7);
  const planetBase = planetIdx * 50;
  const absLevel = planetBase + (currentWorldIdx * 5 + currentLevelIdx);
  const oldPlanetIdx = planetIdx;
  if ((p.level||0) <= absLevel) {
    p.level = absLevel + 1;
  }
  const newPlanetIdx = Math.floor(p.level/50);
  // Nieuwe planeet vrijgespeeld — raket animatie!
  if (newPlanetIdx > oldPlanetIdx && newPlanetIdx < PLANETS.length) {
    const fromPlanet = PLANETS[oldPlanetIdx];
    const newPlanet  = PLANETS[newPlanetIdx];
    setTimeout(() => {
      sfxLevelUp();
      showPlanetLaunchAnimation(fromPlanet, newPlanet, () => {
        showToast('🪐 ' + newPlanet.name + ' vrijgespeeld! ' + newPlanet.emoji);
        renderMap();
      });
    }, 1200);
  }
  if (coins > 0) addCoins(coins);
  const daily = updateDailyProgress();
  if (daily.justReached) setTimeout(() => showDailyGoalCelebration(p.name), 500);
  saveState();
  setTimeout(() => checkAndAwardBadges(), 500);
}

let discoveryStory = null;
let discoveryPhase = 'story'; // story | vraag1 | vraag2 | vraag3 | result
let discoveryScore = 0;
let discoveryQIdx  = 0;
let discoveryCorrect = [];

function showTitansOntdekking(worldIdx, playerIdx) {
  // Kies verhaal op basis van wereld (cyclisch)
  const available = TITANS_STORIES.filter(s => s.world <= Math.min(worldIdx, 9));
  const storyPool = available.length > 0 ? available : TITANS_STORIES;
  // Probeer een nieuw verhaal dat nog niet gezien is
  const seen = (getPlayer().seenStories || []);
  const unseen = storyPool.filter(s => !seen.includes(s.id));
  discoveryStory = unseen.length > 0
    ? unseen[Math.floor(Math.random() * unseen.length)]
    : storyPool[Math.floor(Math.random() * storyPool.length)];

  discoveryPhase = 'story';
  discoveryScore = 0;
  discoveryQIdx  = 0;
  discoveryCorrect = [];

  renderDiscovery();
  document.getElementById('challenge-modal').classList.add('open');
}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          ${shuffleArr([...q.opts]).map(o =>
            `<button class="math-btn" onclick="checkDiscovery('${o.replace(/'/g,"\\'")}')"

          ).join('')}
        </div>

        <!-- Score -->
        <div style="font-family:Fredoka One,cursive;color:#57c785;font-size:0.85rem">
          ⭐ ${discoveryScore}/${discoveryQIdx} goed
        </div>
      </div>`;

  } else if (discoveryPhase === 'result') {
    const pct = Math.round((discoveryScore / s.vragen.length) * 100);
    const reward = Math.round((discoveryScore / s.vragen.length) * 30) + 5;
    const stars  = pct >= 80 ? 3 : pct >= 50 ? 2 : 1;

    box.innerHTML = `
      <div style="text-align:center;padding:8px">

        <div style="font-size:2rem;margin:8px 0">
          ${Array.from({length:3},(_,i)=>`<span style="filter:${i<stars?'none':'grayscale(1)opacity(0.3)'}">⭐</span>`).join('')}

        <div style="background:#0f3460;border-radius:14px;padding:10px;margin:10px 0;text-align:left">
          ${s.vragen.map((q,i) => `
            <div style="display:flex;gap:8px;align-items:center;padding:4px 0;
              border-bottom:1px solid rgba(255,255,255,0.08)">
              <span>${discoveryCorrect[i] ? '✅' : '❌'}</span>
              <span style="font-size:0.78rem;color:rgba(255,255,255,0.8)">${q.v.slice(0,40)}...</span>
            </div>`).join('')}
        </div>

        <div style="font-family:Fredoka One,cursive;color:#f5a623;font-size:1.2rem;margin:8px 0">
          +${reward} Titan Coins! 🪙
        </div>

        <!-- Finn tip -->
        <div style="background:rgba(87,199,133,0.1);border:1px solid #57c785;border-radius:12px;
          padding:8px;margin:8px 0;display:flex;gap:8px;align-items:flex-start">
          <span style="font-size:1.4rem">🧑‍🏫</span>
          <span style="font-size:0.78rem;color:rgba(255,255,255,0.8);text-align:left">
            ${pct >= 80
              ? 'Professor Finn: "Geweldig! Je hebt echt opgelet. Kennis is macht!"'
              : 'Professor Finn: "Lees het verhaal nog eens — je onthoudt meer dan je denkt!"'}
          </span>
        </div>

        <button class="btn-primary" onclick="finishDiscovery(${reward},${stars===3})"
          style="font-size:1rem;padding:12px 28px;margin-top:4px">
          TITANS GO! ⚡
        </button>
      </div>`;
  }
}

function startDiscoveryVragen() {
  discoveryPhase = 'vraag';
  discoveryQIdx  = 0;
  renderDiscovery();
}

function checkDiscovery(answer) {
  const s = discoveryStory;
  const q = s.vragen[discoveryQIdx];
  const btns = document.querySelectorAll('.math-btn');
  btns.forEach(b => b.onclick = null);

  const correct = answer === q.a;
  discoveryCorrect.push(correct);
  if (correct) {
    discoveryScore++;
    sfxCorrect();
    btns.forEach(b => { if (b.textContent.trim() === answer) b.classList.add('correct-ans'); });
  } else {
    sfxWrong();
    btns.forEach(b => {
      if (b.textContent.trim() === answer) b.classList.add('wrong-ans');
      if (b.textContent.trim() === q.a)    b.classList.add('correct-ans');
    });
  }

  discoveryQIdx++;
  if (discoveryQIdx >= s.vragen.length) {
    setTimeout(() => { discoveryPhase = 'result'; renderDiscovery(); }, 900);
  } else {
    setTimeout(() => renderDiscovery(), 900);
  }
}

function finishDiscovery(reward, perfect) {
  // Markeer verhaal als gezien
  const p = getPlayer();
  if (!p.seenStories) p.seenStories = [];
  if (!p.seenStories.includes(discoveryStory.id)) {
    p.seenStories.push(discoveryStory.id);
  }
  saveState();
  closeChallenge();
  completeChallenge(reward, perfect);
}

  try {

    if (!id) { id = 'fam_' + Math.random().toString(36).slice(2,10); localStorage.setItem(FAMILY_KEY, id); }

  } catch(e) { return 'fam_local'; }

function getRegistration() { try { return JSON.parse(localStorage.getItem(REG_KEY)||'null'); } catch(e) { return null; } }

function checkRegistration() {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('invite') === '1') {
    // Nieuwe familie via deellink — wis lokale data en toon registratie
    window.history.replaceState({}, '', window.location.pathname);
    try {
      localStorage.removeItem('sterrenpad_v4');
      localStorage.removeItem(REG_KEY);
      localStorage.removeItem(FAMILY_KEY);
    } catch(e) {}
    // Reset state naar leeg (geen Mila/Dewi)
    state.players = [];
    state.ownedItems = [];
    state.ownedAvatarItems = [];
    setTimeout(() => showAccessScreen(), 400);
    return false;
  }

  // Bestaande gebruiker met eigen data → altijd door
  const hasData = !!localStorage.getItem('sterrenpad_v4');
  const reg = getRegistration();
  if (hasData) {
    if (!reg || !reg.approved) saveRegistration({ approved:true, existing:true, familyId:getFamilyId(), date:new Date().toLocaleDateString('nl-NL') });

  }
  if (reg && reg.approved) return true;
  if (reg && !reg.approved) { setTimeout(() => showPendingScreen(reg), 400); return false; }
  // Splinternieuw apparaat zonder data → registratie
  setTimeout(() => showAccessScreen(), 400);
  return false;
}

function useAccessCode() {
  const code = (document.getElementById('access-code')?.value||'').trim().toUpperCase();
  const errEl = document.getElementById('access-error');
  if (code === ADMIN_APPROVE_CODE || code === FAMILY_APPROVE_CODE) {
    const isAdmin = (code === ADMIN_APPROVE_CODE);
    // Herstel admin flag — ook als backup was ingezet zonder admin:true
    const existing = getRegistration() || {};
    saveRegistration({ ...existing, approved:true, admin:isAdmin, familyId:getFamilyId()||existing.familyId, date:new Date().toLocaleDateString('nl-NL') });
    document.getElementById('reg-overlay')?.remove();
    showToast(isAdmin ? '✅ Admin toegang hersteld!' : '✅ Welkom!');
    sfxLevelUp();
    if (isAdmin) document.getElementById('nav-admin')?.style.setProperty('display','flex');
    updateCoinDisplay(); setWorldForPlayer(); renderHome();
  } else if (code.length > 0) {
    if (errEl) errEl.textContent = '❌ Onjuiste code.';
    sfxWrong();
    setTimeout(() => { if(errEl) errEl.textContent=''; }, 2000);
  } else {
    if (errEl) errEl.textContent = 'Voer een code in.';
  }
}

async function submitRegistration() {
  const parent = document.getElementById('reg-parent')?.value?.trim();
  const family = document.getElementById('reg-family')?.value?.trim();
  const errEl  = document.getElementById('reg-error');
  if (!parent || !family) { if(errEl) errEl.textContent='Vul naam en familienaam in!'; return; }

  const avatars = ['🦁','🐯','🐼','🦊'];
  const children = [];
  for (let i=1; i<=4; i++) {
    const name  = document.getElementById(`reg-c${i}name`)?.value?.trim();
    const grade = document.getElementById(`reg-c${i}grade`)?.value;
    if (name) children.push({ name, grade: parseInt(grade)||2, avatar: avatars[i-1] });
  }
  if (children.length === 0) { if(errEl) errEl.textContent='Voeg minimaal 1 kind toe!'; return; }

  if (errEl) errEl.textContent = '⏳ Aanmelding versturen...';
  const fid = getFamilyId();

  // Sla op in Supabase — status: pending
  await sbFetch('families?on_conflict=id', 'POST', {
    id: fid, family_name: family, parent_name: parent,
    approved: false, children, created_at: new Date().toISOString()
  });

  // Lokaal opslaan als pending
  saveRegistration({ approved:false, familyId:fid, familyName:family, parentName:parent, children, date:new Date().toLocaleDateString('nl-NL') });

  // Maak LEGE spelers aan — geen Mila/Dewi data
  state.players = children.map(ch => makeDefaultPlayer(ch.name, ch.avatar, ch.grade));
  state.currentPlayer = 0;
  state.ownedItems = children.map(() => []);
  state.ownedAvatarItems = children.map(() => []);
  state.customMissions = [];
  state.pendingChildMissions = [];
  saveState();

  document.getElementById('reg-overlay')?.remove();
  showPendingScreen({ familyName: family });
}

async function approveFamily(familyId) {
  // PATCH met Supabase vereist speciale header
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/families?id=eq.' + familyId, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ approved: true, approved_at: new Date().toISOString() })
    });
    if (r.ok) {
      showToast('✅ Familie goedgekeurd!'); sfxLevelUp();
      setTimeout(() => renderAdminDashboard(), 500);
    } else {
      const err = await r.text();
      console.error('Approve fout:', r.status, err);
      showToast('❌ Fout: ' + r.status, true);
    }
  } catch(e) { showToast('❌ Verbindingsfout', true); }
}

function exportBackup() {
  try {
    const backup = { version:'sterrenpad_backup_v1', date:new Date().toISOString(), familyId:getFamilyId(), state, registration:getRegistration() };
    const blob = new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`sterrenpad-backup-${new Date().toLocaleDateString('nl-NL').replace(/\//g,'-')}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast('✅ Backup gemaakt!');
  } catch(e) { showToast('❌ Backup mislukt', true); }
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.version?.includes('sterrenpad_backup')) { showToast('❌ Ongeldig backup bestand!',true); return; }
      if (backup.state) { state={...state,...backup.state}; try{localStorage.setItem('sterrenpad_v4',JSON.stringify(state));}catch(e){} }
      if (backup.registration) {
        // Bewaar huidige admin status — overschrijf deze NOOIT met backup
        const currentReg = getRegistration() || {};
        const isCurrentlyAdmin = currentReg.admin === true;
        const newReg = { ...backup.registration };
        if (isCurrentlyAdmin) newReg.admin = true; // Behoud admin flag
        saveRegistration(newReg);
        if (newReg.admin) document.getElementById('nav-admin')?.style.setProperty('display','flex');
      }
      updateCoinDisplay(); setWorldForPlayer(); renderHome(); renderParentReport();
      showToast('✅ Backup hersteld!'); sfxLevelUp();
    } catch(e) { showToast('❌ Fout bij herstellen: '+e.message,true); }
  };
  reader.readAsText(file); input.value='';
}

const DAILY_GOAL_LEVELS = 3; // 3 levels per dag = dagdoel
const DAILY_GOAL_KEY = 'tp_daily_goal';

function getDailyProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(DAILY_GOAL_KEY) || '{}');
    const today = new Date().toDateString();
    const pid = state.currentPlayer;
    if (!d[pid] || d[pid].date !== today) {
      return { date: today, levelsToday: 0, goalReached: false };
    }
    return d[pid];
  } catch(e) { return { date: new Date().toDateString(), levelsToday: 0, goalReached: false }; }
}

function updateDailyProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(DAILY_GOAL_KEY) || '{}');
    const today = new Date().toDateString();
    const pid = state.currentPlayer;
    if (!d[pid] || d[pid].date !== today) {
      d[pid] = { date: today, levelsToday: 0, goalReached: false };
    }
    d[pid].levelsToday++;
    const justReached = d[pid].levelsToday === DAILY_GOAL_LEVELS && !d[pid].goalReached;
    if (justReached) d[pid].goalReached = true;
    localStorage.setItem(DAILY_GOAL_KEY, JSON.stringify(d));
    return { levelsToday: d[pid].levelsToday, justReached };
  } catch(e) { return { levelsToday: 0, justReached: false }; }
}

      ctx.clearRect(0,0,c.width,c.height);
      pieces.forEach(p => {
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotS; p.vy+=0.08;
        if(p.y>c.height+20){p.y=-20;p.x=Math.random()*c.width;}
      });
      if(++frame<240) requestAnimationFrame(draw);
    }
    draw();
  }, 100);

  // Auto-sluiten na 8 seconden
  setTimeout(() => document.getElementById('daily-cel')?.remove(), 8000);
}

// Meer coins bij zwakste vaardigheid, extra feest bij doorbraak
function getSmartReward(baseReward, type, wasCompleted) {
  if (wasCompleted) return Math.floor(baseReward / 2);
  const p = getPlayer();
  const skills = p.skills || { spell:50, math:50, lang:50 };

  // Bepaal zwakste vaardigheid
  const skillMap = { spell: skills.spell||50, math: skills.math||50, lang: skills.lang||50 };
  const typeSkillMap = { spell:'spell', math:'math', staal:'lang', topo:'lang',
    boss:'math', speed:'math', memory:'spell', ontdekking:'lang' };
  const relevantSkill = typeSkillMap[type] || 'spell';
  const minSkill = Math.min(...Object.values(skillMap));
  const isWeakest = skillMap[relevantSkill] === minSkill && minSkill < 70;

  // Bonus multiplier voor zwakste vaardigheid
  let multiplier = 1.0;
  if (isWeakest) multiplier = 1.5; // 50% meer bij zwakste vaardigheid

  return Math.round(baseReward * multiplier);
}

function checkBreakthrough(type, oldSkill, newSkill) {
  // Doorbraak: over een drempel heen (35, 65, 100, 110)
  const thresholds = [35, 65, 100, 110];
  for (const t of thresholds) {
    if (oldSkill < t && newSkill >= t) return t;
  }
  return null;
}

    </div>`;

  window._simon = { colors, startLen, maxLevel: perf >= 3 ? 6 : perf >= 2 ? 4 : 3 };
  setTimeout(() => simonNextRound(), 800);
}

function simonNextRound() {
  const s = window._simon;
  simonLevel++;
  simonInput = [];
  simonActive = false;

  // Voeg een kleur toe aan de reeks
  simonSeq.push(Math.floor(Math.random() * 4));

  const msg = document.getElementById('simon-msg');
  if (msg) msg.textContent = `👀 Kijk goed! Ronde ${simonLevel}`;
  const sc = document.getElementById('simon-score');
  if (sc) sc.textContent = `Ronde: ${simonLevel}`;

  // Speel reeks af
  let delay = 600;
  simonSeq.forEach((idx, i) => {
    setTimeout(() => simonFlash(idx), delay + i * 700);
  });
  setTimeout(() => {
    simonActive = true;
    if (msg) msg.textContent = '👆 Jouw beurt!';
  }, delay + simonSeq.length * 700 + 200);
}

function simonFlash(idx) {
  const btn = document.getElementById(`simon-${idx}`);
  if (!btn) return;
  const s = window._simon;
  btn.style.background = s.colors[idx];
  btn.style.transform = 'scale(0.92)';
  sfxClick();
  setTimeout(() => {
    btn.style.background = s.colors[idx] + '44';
    btn.style.transform = 'scale(1)';
  }, 350);
}

function simonTap(idx) {
  if (!simonActive) return;
  const s = window._simon;
  simonFlash(idx);
  simonInput.push(idx);

  const pos = simonInput.length - 1;
  if (simonInput[pos] !== simonSeq[pos]) {
    // Fout!
    simonActive = false;
    sfxWrong();
    const reward = Math.max(2, (simonLevel - 1) * 4);
    const msg = document.getElementById('simon-msg');
    if (msg) msg.textContent = `❌ Fout! Je haalde ronde ${simonLevel-1}. +${reward} coins`;
    setTimeout(() => { addCoins(reward); showToast(`🧠 Ronde ${simonLevel-1} gehaald! +${reward} coins`); completeChallenge(0, false); }, 1200);
    return;
  }

  if (simonInput.length === simonSeq.length) {
    simonActive = false;
    sfxCorrect();
    if (simonLevel >= s.maxLevel) {
      // Gewonnen!
      const reward = simonLevel * 6;
      const msg = document.getElementById('simon-msg');
      if (msg) msg.textContent = `🏆 GEWELDIG! Alle rondes! +${reward} coins!`;
      sfxLevelUp();
      setTimeout(() => { addCoins(reward); showToast(`🧠 Simon Says gewonnen! +${reward} coins!`); completeChallenge(0, true); }, 1200);
    } else {
      const msg = document.getElementById('simon-msg');
      if (msg) msg.textContent = `✅ Goed! Volgende ronde...`;
      setTimeout(() => simonNextRound(), 1000);
    }
  }
}

// SNEL REKENEN — zo snel mogelijk 5 sommen beantwoorden
function showSnelRekenen() {
  const perf = getWheelSpins();
  const difficulty = perf >= 3 ? 'hard' : perf >= 2 ? 'medium' : 'easy';
  const totalQ = 5;
  let current = 0, score = 0, startTime = Date.now();
  window._snelR = { difficulty, totalQ, current, score };

  function getQ() {
    if (difficulty === 'easy') {
      const a = Math.floor(Math.random()*10)+1;
      const b = Math.floor(Math.random()*10)+1;
      return { q:`${a} + ${b}`, a: a+b };
    } else if (difficulty === 'medium') {
      const a = Math.floor(Math.random()*20)+5;
      const b = Math.floor(Math.random()*10)+1;
      const ops = [
        { q:`${a} + ${b}`, a: a+b },
        { q:`${a} - ${b}`, a: a-b },
      ];
      return ops[Math.floor(Math.random()*ops.length)];
    } else {
      const a = Math.floor(Math.random()*10)+2;
      const b = Math.floor(Math.random()*10)+2;
      return { q:`${a} × ${b}`, a: a*b };
    }
  }

  function showQ() {
    const box = document.getElementById('challenge-content');
    if (!box) return;
    const q = getQ();
    window._snelR.currentQ = q;
    const wrong = [q.a+1, q.a-1, q.a+2, q.a-2, q.a+3].filter(x=>x!==q.a&&x>0);
    const opts = shuffleArr([q.a, ...wrong.slice(0,3)]);

    box.innerHTML = `
      <div style="text-align:center">

          <div style="font-family:Fredoka One,cursive;font-size:2.5rem;color:white">${q.q} = ?</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          ${opts.map(o => `
            <button onclick="snelCheck(this,${o},${q.a})"
              style="padding:16px;font-family:Fredoka One,cursive;font-size:1.6rem;
              background:#1a2744;color:#f5a623;border:2px solid rgba(245,166,35,0.3);
              border-radius:14px;cursor:pointer">${o}</button>`).join('')}
        </div>
        <button onclick="closeChallenge()" class="btn-secondary">← Terug</button>
      </div>`;
  }

  window._snelShowQ = showQ;
  window._snelStart = Date.now();
  showQ();

  window._snelCheck = function(btn, answer, correct) {
    document.querySelectorAll('[onclick^="snelCheck"]').forEach(b => b.onclick = null);
    if (answer === correct) {
      btn.style.background = '#57c785'; sfxCorrect(); score++;
    } else {
      btn.style.background = '#e94560'; sfxWrong();
      document.querySelectorAll('[onclick^="snelCheck"]').forEach(b => {
        if (parseInt(b.textContent) === correct) b.style.background = '#57c785';
      });
    }
    current++;
    window._snelR.current = current; window._snelR.score = score;
    if (current >= totalQ) {
      const elapsed = Math.round((Date.now() - window._snelStart) / 1000);
      const reward = score * 5 + (elapsed < 20 ? 10 : 0);
      setTimeout(() => { addCoins(reward); showToast(`⚡ ${score}/${totalQ} goed! +${reward} coins!`); completeChallenge(0, score===totalQ); }, 800);
    } else {
      setTimeout(showQ, 700);
    }
  };
  showQ();
}

function taalTik(side, idx, word) {
  const btn = document.getElementById(`taal-${side}-${idx}`);
  if (!btn || btn.disabled) return;

  if (!_taalSelected) {
    // Eerste selectie
    _taalSelected = { side, idx, word };
    btn.style.background = '#1565c0';
    btn.style.borderColor = '#42a5f5';
    sfxClick();
  } else {
    // Tweede selectie — check of het een paar is
    const other = _taalSelected;
    const otherBtn = document.getElementById(`taal-${other.side}-${other.idx}`);

    // Deselecteer als zelfde knop
    if (other.side === side && other.idx === idx) {
      btn.style.background = '#1a2744';
      btn.style.borderColor = side === 'L' ? 'rgba(245,166,35,0.3)' : 'rgba(87,199,133,0.3)';
      _taalSelected = null;
      return;
    }

    // Zoek het paar
    const leftWord  = side === 'L' ? word : other.word;
    const rightWord = side === 'R' ? word : other.word;
    const isPair = _taalPairs.some(p => p[0] === leftWord && p[1] === rightWord);

    if (isPair && other.side !== side) {
      // Correct paar!
      sfxCorrect();
      [btn, otherBtn].forEach(b => {
        if (b) { b.style.background='#57c785'; b.style.borderColor='#57c785'; b.disabled=true; b.style.opacity='0.7'; }
      });
      _taalMatched.push(leftWord);
      _taalScore++;
      const msg = document.getElementById('taal-msg');
      if (msg) msg.textContent = `✅ ${leftWord} = ${rightWord}!`;

      // Gewonnen?
      if (_taalMatched.length === _taalPairs.length) {
        sfxLevelUp();
        const reward = 20 + _taalScore * 2;
        setTimeout(() => {
          addCoins(reward);
          showToast(`🌍 Alle paren gevonden! +${reward} coins!`);
          completeChallenge(0, true);
        }, 800);
      }
    } else {
      // Fout
      sfxWrong();
      [btn, otherBtn].forEach(b => {
        if (b) { b.style.background='#e9456033'; b.style.borderColor='#e94560'; }
      });
      setTimeout(() => {
        [btn, otherBtn].forEach(b => {
          if (b) { b.style.background='#1a2744'; b.style.borderColor = '#1a2744' === b.id?.includes('-L-') ? 'rgba(245,166,35,0.3)' : 'rgba(87,199,133,0.3)'; }
        });
        if (otherBtn) { otherBtn.style.borderColor = 'rgba(245,166,35,0.3)'; }
        if (btn) { btn.style.borderColor = 'rgba(87,199,133,0.3)'; }
      }, 700);
    }

function submitChildMission() {
  const title  = document.getElementById('child-mission-title')?.value?.trim();
  const coins  = parseInt(document.getElementById('child-mission-coins')?.value) || 15;
  const player = state.currentPlayer;
  const p      = getPlayer();

  if (!title || title.length < 3) { showToast('Schrijf eerst wat je wilt doen!', true); return; }

  // Voeg toe als pending mission
  const id = 'child_' + Date.now();
  if (!state.pendingChildMissions) state.pendingChildMissions = [];
  state.pendingChildMissions.push({
    id, title, coins: Math.min(100, Math.max(1, coins)),
    player: player, playerName: p.name,
    date: new Date().toLocaleDateString('nl-NL'),
    status: 'pending'
  });
  saveState();

  document.getElementById('child-mission-overlay')?.remove();
  sfxLevelUp();
  showToast(`📬 Klusje "${title}" ingediend! Wacht op goedkeuring 🔒`);
}

function checkTimeLimit() {
  const tl = getTimeLimit();
  if (!tl.enabled) return;
  const pid = state.currentPlayer;
  const used = getUsedTimeToday(pid);
  const elapsed = Math.floor((Date.now() - (_sessionStart||Date.now())) / 60000);
  const totalUsed = used + elapsed;
  const naam = state.players[pid]?.name || 'Kind';

  if (totalUsed >= tl.minutes && !_timeLimitWarned) {
    _timeLimitWarned = true;
    saveUsedTime(totalUsed, pid);
    showTimeLimitScreen(tl.minutes, naam);
  } else if (totalUsed >= tl.minutes - 2 && !_timeLimitWarned) {
    showToast(`⏰ ${naam}: nog 2 minuten over vandaag!`);
  }
}

const AUDIO_KEY = 'tp_audio_library';
function getAudioLibrary() { try { return JSON.parse(localStorage.getItem(AUDIO_KEY)||'[]'); } catch(e) { return []; } }
function saveAudioLibrary(lib) { try { localStorage.setItem(AUDIO_KEY, JSON.stringify(lib)); } catch(e) {} }

function detectAudioType(url, title) {
  const u = url.toLowerCase(), t = (title||'').toLowerCase();
  let platform = 'link';
  if (u.includes('spotify.com')||u.includes('spotify:')) platform='spotify';
  else if (u.includes('podcasts.apple.com')||u.includes('overcast')||u.includes('pocketcasts')) platform='podcast-app';
  else if (u.includes('audible')||u.includes('storytel')||u.includes('bol.com')) platform='luisterboek-app';
  else if (u.includes('youtube.com')||u.includes('youtu.be')) platform='youtube';
  let cat = 'muziek';
  const podcastWords=['podcast','aflevering','episode','nieuws','radio','npo','bnr','interview'];
  const boekWords=['luisterboek','audiobook','verhaal','boek','sprookje','story','storytel','audible'];
  if (podcastWords.some(w=>u.includes(w)||t.includes(w))) cat='podcast';
  else if (boekWords.some(w=>u.includes(w)||t.includes(w))) cat='luisterboek';
  else if (u.includes('spotify.com/episode')||u.includes('spotify.com/show')) cat='podcast';
  else if (u.includes('spotify.com/audiobook')) cat='luisterboek';
  return { platform, cat };
}

function getOpenUrl(item) {
  if (item.platform==='spotify') {
    const match = item.url.match(/open\.spotify\.com\/(playlist|album|track|episode|show|audiobook)\/([a-zA-Z0-9]+)/);
    if (match) return `spotify://${match[1]}/${match[2]}`;
  }
  return item.url;
}

function getSunProgress() {
