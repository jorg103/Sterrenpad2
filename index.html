      <div style="font-size:0.85rem;color:#888;margin-bottom:12px">Onthoud deze volgorde!</div>
      <button class="btn-primary" id="mem-ready" onclick="startMemoryInput(${reward})">Ik heb het! 👀</button>
    </div>`;
}

function startMemoryInput(reward) {
  memoryPhase = 'input';
  memoryInput = [];
  const emojis = ['🌸','🦁','⭐','🎈','🌈','🦄','🔥','💎'];
  const box = document.getElementById('challenge-content');
  box.innerHTML = `
    <div style="text-align:center">
      <div style="font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--purple);margin-bottom:8px">Wat was de volgorde?</div>
      <div style="font-size:2rem;margin-bottom:12px;letter-spacing:4px;min-height:2.5rem" id="mem-input-display">?</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
        ${emojis.map(e => `<button style="font-size:1.8rem;padding:10px;border:none;border-radius:12px;background:#f0edff;cursor:pointer" onclick="memoryTap('${e}',${reward})">${e}</button>`).join('')}
      </div>
      <button class="btn-secondary" onclick="closeChallenge()">← Terug</button>
    </div>`;
}

function memoryTap(emoji, reward) {
  memoryInput.push(emoji);
  const disp = document.getElementById('mem-input-display');
  if (disp) disp.textContent = memoryInput.join('');

  if (memoryInput.length === memorySequence.length) {
    const correct = memoryInput.join('') === memorySequence.join('');
    if (correct) {
      sfxPerfect();
      recordAnswer('spell', true, 5000);
      closeChallenge();
      completeChallenge(reward, true);
    } else {
      sfxWrong();
      showToast(`Het was: ${memorySequence.join('')}`, true);
      setTimeout(() => { closeChallenge(); completeChallenge(Math.floor(reward/3), false); }, 1800);
    }
  }
}

function renderPlayerReport(p, idx) {
  const skills = p.skills || {spell:50, math:50, lang:50};

  const worldIdx = Math.min(Math.floor((p.level||0)/5), 49);
  const world = WORLDS[worldIdx];
  const wallet = p.wallet || {};

  // Statistieken berekenen
  const totalAnswers = history.length;
  const correctAnswers = history.filter(h => h.correct).length;
  const accuracy = totalAnswers > 0 ? Math.round(correctAnswers/totalAnswers*100) : 0;
  const avgSpeedMs = totalAnswers > 0 ? Math.round(history.reduce((s,h)=>s+h.ms,0)/totalAnswers/1000) : 0;

  // Per type
  const spellH = history.filter(h=>h.type==='spell');
  const mathH  = history.filter(h=>h.type==='math');
  const langH  = history.filter(h=>h.type==='lang');

  const spellAcc = spellH.length ? Math.round(spellH.filter(h=>h.correct).length/spellH.length*100) : null;
  const mathAcc  = mathH.length  ? Math.round(mathH.filter(h=>h.correct).length/mathH.length*100)   : null;
  const langAcc  = langH.length  ? Math.round(langH.filter(h=>h.correct).length/langH.length*100)   : null;

  // Trend laatste 5 vs eerste 5
  const spellTrend = getDetailedTrend(spellH);
  const mathTrend  = getDetailedTrend(mathH);

  // Sterke en zwakke punten
  const strengths = [], improvements = [];
  if (skills.spell >= 65) strengths.push('⚡ Titan Code');
  else if (skills.spell < 35) improvements.push('⚡ Titan Code');
  if (skills.math >= 65) strengths.push('🧠 Titan Brain');
  else if (skills.math < 35) improvements.push('🧠 Titan Brain');
  if (skills.lang >= 65) strengths.push('🌍 Titans Talk');
  else if (skills.lang < 35) improvements.push('🌍 Titans Talk');

              <span style="font-size:0.68rem;color:rgba(255,255,255,0.35)">🪙${d.at}</span>
            </div>`).join('')}
        </div>` : ''}

      </div>
    </div>

    ${renderSkillSliders(p, idx)}
  `;
}

function getDetailedTrend(history) {
  if (history.length < 4) return null;
  const recent = history.slice(-5);
  const older  = history.slice(-10, -5);
  if (older.length < 2) return null;
  const recentAcc = recent.filter(h=>h.correct).length / recent.length;
  const olderAcc  = older.filter(h=>h.correct).length  / older.length;
  const diff = recentAcc - olderAcc;
  if (diff > 0.15) return '📈 verbeterd';
  if (diff < -0.15) return '📉 let op';
  return '➡️ stabiel';
}

function checkAndAwardBadges() {
  const p = getPlayer();
  if (!p.badges) p.badges = [];
  if (!p.streakData) p.streakData = { lastDate: null, streak: 0, totalDays: 0 };

  const today = new Date().toDateString();
  const sd = p.streakData;

  // Update streak
  if (sd.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (sd.lastDate === yesterday) {
      sd.streak = (sd.streak||0) + 1;
    } else if (sd.lastDate !== today) {
      sd.streak = 1;
    }
    sd.lastDate = today;
    sd.totalDays = (sd.totalDays||0) + 1;
  }

  const newBadges = [];
  BADGES.forEach(b => {
    if (p.badges.includes(b.id)) return;
    let earned = false;
    if (b.req    && sd.streak >= b.req)           earned = true;
    if (b.level  && (p.level||0) >= b.level)      earned = true;
    if (b.perfect && (p.perfectCount||0) >= b.perfect) earned = true;
    if (b.coins  && (p.totalCoinsEarned||0) >= b.coins) earned = true;
    if (b.worlds && Math.floor((p.level||0)/5) >= b.worlds) earned = true;
    if (b.staal  && (p.staalCount||0) >= b.staal) earned = true;
    if (earned) { p.badges.push(b.id); newBadges.push(b); }
  });

  if (newBadges.length > 0) {
    saveState();
    setTimeout(() => showNewBadges(newBadges), 1000);
  }
}

function startMission(missionId) {
  const m = getMissions().find(x => x.id === missionId);
  if (!m) return;
  const p = getPlayer();
  const today = new Date().toDateString();

  if (m.freeItem) {
    // Compliment — direct belonen
    completeMission(missionId);
    return;
  }

  if (!m.needsApproval) {
    // Geen goedkeuring nodig — direct
    const box = document.getElementById('challenge-content');
    box.innerHTML = `
      <div style="text-align:center;padding:10px">
        <div style="font-size:3rem">${m.emoji}</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:#f5a623">${m.title}</div>

        </div>

        </button>
        <br><button class="btn-secondary" onclick="closeChallenge()" style="margin-top:8px">Nog niet</button>
      </div>`;
    document.getElementById('challenge-modal').classList.add('open');
  } else {
    // Ouder goedkeuring nodig
    if (!p.pendingMissions) p.pendingMissions = {};
    p.pendingMissions[missionId] = today;
    saveState();
    renderWallet();
    showToast(`${m.emoji} Missie gestart! Vraag een ouder om goed te keuren in het HQ!`);
  }
}

function completeMission(missionId) {
  const m = getMissions().find(x => x.id === missionId);
  if (!m) return;
  const p = getPlayer();
  const today = new Date().toDateString();
  if (!p.completedMissions) p.completedMissions = {};
  p.completedMissions[missionId] = today;
  if (p.pendingMissions) delete p.pendingMissions[missionId];

  sfxLevelUp();
  closeChallenge();
  addCoins(m.reward);
  saveState();
  renderWallet();

  if (m.freeItem) {
    showToast(`💛 Compliment gegeven! +${m.reward} coins & een verrassing in de winkel!`);
    // Geef gratis willekeurig shop item
    grantFreeItem();
  } else {
    showToast(`${m.emoji} ${m.title} gedaan! +${m.reward} Titan Coins! BOOYAH!`);
  }
  checkAndAwardBadges();
}

function grantFreeItem() {
  const allItems = getShopItems(state.currentPlayer);
  const owned = state.ownedItems[state.currentPlayer] || [];
  const available = allItems.filter(it => !owned.includes(it.id) && !it.locked);
  if (available.length === 0) return;
  const item = available[Math.floor(Math.random() * Math.min(available.length, 10))];
  state.ownedItems[state.currentPlayer] = [...owned, item.id];
  saveState();
  showToast(`🎁 Gratis item: ${item.emoji} ${item.name}!`);
}

// Parent approvalmission
function approveParentMission(playerIdx, missionId) {
  const p = state.players[playerIdx];
  if (!p.pendingMissions || !p.pendingMissions[missionId]) {
    showToast('Geen wachtende missie gevonden', true);
    return;
  }
  const prevPlayer = state.currentPlayer;
  state.currentPlayer = playerIdx;
  completeMission(missionId);
  state.currentPlayer = prevPlayer;
  renderParentReport();
  showToast('✅ Missie goedgekeurd! Coins uitbetaald!');
}

const PARENT_PIN_KEY = 'tp_parent_pin';
const BIOMETRIC_KEY  = 'tp_biometric_setup';

function getParentPin() {
  try { return localStorage.getItem(PARENT_PIN_KEY); } catch(e) { return null; }
}
function setParentPin(pin) {
  try { localStorage.setItem(PARENT_PIN_KEY, pin); } catch(e) {}
}
function isBiometricSetup() {
  try { return localStorage.getItem(BIOMETRIC_KEY) === '1'; } catch(e) { return false; }
}
function setBiometricSetup(v) {
  try { localStorage.setItem(BIOMETRIC_KEY, v ? '1' : '0'); } catch(e) {}
}

// Check of Web Authentication API beschikbaar is
function hasBiometrics() {
  return !!(window.PublicKeyCredential &&
    typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function');
}

async function biometricAvailable() {
  try {
    if (!hasBiometrics()) return false;
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  } catch(e) { return false; }
}

// Toon het slot scherm
async function showParentLock() {
  const modal = document.getElementById('parent-lock-modal');
  const inner = document.getElementById('parent-lock-inner');
  modal.classList.add('open');

  const hasPin    = !!getParentPin();
  const bioSetup  = isBiometricSetup();
  const bioAvail  = await biometricAvailable();

  if (!hasPin) {
    // Eerste keer: stel PIN in (+ optioneel Face ID)
    renderSetupScreen(inner, bioAvail);
  } else if (bioSetup && bioAvail) {
    // Face ID / Touch ID beschikbaar en ingesteld
    renderBiometricScreen(inner);
    setTimeout(() => triggerBiometric(), 300);
  } else {
    // PIN invoer
    renderPinScreen(inner, false);
  }
}

// ===== NUMPAD =====
function renderNumpad(action) {
  const keys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto">
    ${keys.map(k => k === '' ? '<div></div>' : `
      <button onclick="numpadTap('${k}','${action}')"
        style="padding:14px 0;font-family:'Fredoka One',cursive;font-size:1.4rem;
        background:#1a2744;color:${k==='⌫'?'#e94560':'#f5a623'};
        border:1px solid rgba(245,166,35,0.2);border-radius:12px;cursor:pointer;
        transition:all 0.1s;active:background:#0f3460"
        onmousedown="this.style.background='#0f3460'"
        onmouseup="this.style.background='#1a2744'"
        ontouchstart="this.style.background='#0f3460'"
        ontouchend="this.style.background='#1a2744'">${k}</button>`
    ).join('')}
  </div>`;
}

// ===== NUMPAD TAP HANDLER =====
function numpadTap(key, action) {
  if (action === 'setupPin') {
    if (key === '⌫') {
      window._setupPin = (window._setupPin||'').slice(0,-1);
    } else if ((window._setupPin||'').length < 4) {
      window._setupPin = (window._setupPin||'') + key;
    }
    updatePinDisplay(window._setupPin);
    if ((window._setupPin||'').length === 4) {
      setTimeout(() => handleSetupPin(), 200);
    }
  } else if (action === 'checkPin') {
    if (key === '⌫') {
      window._enteredPin = (window._enteredPin||'').slice(0,-1);
    } else if ((window._enteredPin||'').length < 4) {
      window._enteredPin = (window._enteredPin||'') + key;
    }
    updatePinDisplay(window._enteredPin);
    if ((window._enteredPin||'').length === 4) {
      setTimeout(() => handleCheckPin(), 200);
    }
  }
}

function updatePinDisplay(pin) {
  const disp = document.getElementById('pin-display');
  if (!disp) return;
  const filled = (pin||'').length;
  disp.textContent = '●'.repeat(filled) + '–'.repeat(4-filled);
}

// ===== SETUP PIN LOGICA =====
function handleSetupPin() {
  const err = document.getElementById('setup-error');
  if (window._setupPhase === 'first') {
    // Sla op en vraag bevestiging
    window._setupPinFirst = window._setupPin;
    window._setupPin = '';
    updatePinDisplay('');
    if (err) err.textContent = '';
    const disp = document.getElementById('pin-display');
    if (disp) disp.textContent = '––––';
    // Verander tekst
    const inner = document.getElementById('parent-lock-inner');
    const title = inner?.querySelector('[style*="1.3rem"]');
    if (title) title.textContent = 'Bevestig je PIN';
    window._setupPhase = 'confirm';
  } else {
    // Bevestiging
    if (window._setupPin === window._setupPinFirst) {
      setParentPin(window._setupPin);
      closeParentLock();
      // Stel ook biometrie in als beschikbaar
      biometricAvailable().then(avail => {
        if (avail) offerBiometricSetup();
        else {
          showToast('✅ PIN ingesteld! Ouder toegang beveiligd.');
          navigate('parent');
        }
      });
    } else {
      if (err) err.textContent = '❌ PINs komen niet overeen. Probeer opnieuw.';
      window._setupPin = '';
      window._setupPinFirst = '';
      window._setupPhase = 'first';
      updatePinDisplay('');
      const inner = document.getElementById('parent-lock-inner');
      const title = inner?.querySelector('[style*="1.3rem"]');
      if (title) title.textContent = 'Kies een PIN';
    }
  }
}

function handleCheckPin() {
  const err = document.getElementById('pin-error');
  if (window._enteredPin === getParentPin()) {
    closeParentLock();
    navigate('parent');
  } else {
    sfxWrong();
    if (err) err.textContent = '❌ Onjuiste PIN';
    window._enteredPin = '';
    updatePinDisplay('');
    setTimeout(() => { if(err) err.textContent = ''; }, 2000);
  }
}

// ===== BIOMETRIE =====
async function triggerBiometric() {
  const status = document.getElementById('bio-status');
  if (status) status.textContent = 'Bezig...';

  try {
    // Gebruik de Web Authentication API voor platform authenticator (Face ID / Touch ID)
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);

    const credential = await navigator.credentials.get({
      publicKey: {
        challenge,
        timeout: 60000,
        userVerification: 'required', // verplicht Face ID / Touch ID
        rpId: window.location.hostname || 'localhost',
        allowCredentials: [] // laat browser zelf kiezen
      }
    });

    if (credential) {
      // Authenticatie geslaagd!
      closeParentLock();
      navigate('parent');
    }
  } catch(e) {
    // Mislukt of geannuleerd
    if (e.name === 'NotAllowedError') {
      if (status) status.textContent = '❌ Geannuleerd. Probeer opnieuw.';
    } else if (e.name === 'InvalidStateError' || e.name === 'NotSupportedError') {
      // Nog niet geregistreerd — val terug op PIN
      if (status) status.textContent = 'Face ID niet beschikbaar.';
      setTimeout(() => {
        setBiometricSetup(false);
        renderPinScreen(document.getElementById('parent-lock-inner'), false);
      }, 1000);
    } else {
      if (status) status.textContent = 'Gebruik PIN in plaats daarvan.';
      setTimeout(() => renderPinScreen(document.getElementById('parent-lock-inner'), false), 1200);
    }
  }
}

async function setupBiometric(overlay) {
  overlay?.remove();
  try {
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const userId = new Uint8Array(16);
    crypto.getRandomValues(userId);

    await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'TitansPad', id: window.location.hostname || 'localhost' },
        user: { id: userId, name: 'ouder', displayName: 'Ouder' },
        pubKeyCredParams: [{ alg: -7, type: 'public-key' }],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required'
        },
        timeout: 60000,
      }
    });

    setBiometricSetup(true);
    showToast('✅ Face ID ingesteld!');
    navigate('parent');
  } catch(e) {
    showToast('Face ID instellen mislukt — gebruik je PIN.', true);
    navigate('parent');
  }
}

}

function saveUsedTime(minutes, playerIdx) {
  try {
    const pid = playerIdx !== undefined ? playerIdx : state.currentPlayer;
    const d = JSON.parse(localStorage.getItem('tp_time_used') || '{}');
    const today = new Date().toDateString();
    const key = `${pid}_${today}`;
    d[key] = minutes;
    // Verwijder data ouder dan 7 dagen
    Object.keys(d).forEach(k => {
      const datePart = k.split('_').slice(1).join('_');
      if (datePart && new Date(datePart) < new Date(Date.now() - 7*86400000)) delete d[k];
    });
    localStorage.setItem('tp_time_used', JSON.stringify(d));
  } catch(e) {}
}

function wheelDraw(angle, prizes) {
  const canvas = document.getElementById('wheel-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 110, cy = 110, r = 105;
  const seg = (Math.PI * 2) / prizes.length;
  ctx.clearRect(0, 0, 220, 220);

  prizes.forEach((p, i) => {
    const start = angle + i * seg;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + seg);
    ctx.closePath();
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = '#0d0d1a';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + seg / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'white';
    ctx.font = 'bold 10px sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 3;
    ctx.fillText(p.label, r - 5, 4);
    ctx.restore();
  });

  // Middencirkel
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = '#0d0d1a';
  ctx.fill();
  ctx.strokeStyle = '#f5a623';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#f5a623';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚡', cx, cy);
  ctx.textBaseline = 'alphabetic';
}

function wheelBtnTap(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const w = window._wheel;
  if (!w || w.spinning) return;
  if (w.spinsLeft <= 0) { wheelClaimAll(); return; }

  w.spinning = true;
  sfxBonus();

  const btn = document.getElementById('wheel-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Draait...'; }

  const segCount = w.prizes.length;
  const segAngle = (Math.PI * 2) / segCount;
  const winIdx = Math.floor(Math.random() * segCount);
  const extraRounds = 4 + Math.floor(Math.random() * 4);
  const startAngle = w.angle;
  const targetAngle = startAngle + (extraRounds * Math.PI * 2) + (winIdx * segAngle) + (segAngle * 0.5);
  const duration = 3500;
  const startTime = performance.now();

  // Failsafe timeout
  const failsafe = setTimeout(() => {
    if (w.spinning) {
      w.spinning = false;
      w.angle = targetAngle;
      wheelFinishSpin(w, winIdx);
    }
  }, 5000);

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    w.angle = startAngle + (targetAngle - startAngle) * ease;
    wheelDraw(w.angle, w.prizes);

    if (progress < 1) {
      w.rafId = requestAnimationFrame(animate);
    } else {
      clearTimeout(failsafe);
      w.spinning = false;
      w.angle = targetAngle;
      wheelFinishSpin(w, winIdx);
    }
  }
  w.rafId = requestAnimationFrame(animate);
}

function wheelFinishSpin(w, winIdx) {
  const prize = w.prizes[winIdx];
  w.spinsLeft--;
  w.totalCoins += prize.coins;
  w.winHistory.push(prize.label);
  sfxLevelUp();

  // Update UI
  const res = document.getElementById('wheel-result');
  if (res) {
    if (w.spinsLeft > 0) {
      res.innerHTML = `🎉 <strong>${prize.label}</strong>! Totaal: ${w.totalCoins} 🪙`;
    } else {
      res.innerHTML = `🎉 <strong>${prize.label}</strong>! Totaal: <strong>${w.totalCoins} coins</strong>!`;
    }
  }

  const spinEl = document.getElementById('wheel-spins-left');
  if (spinEl) spinEl.innerHTML = `Beurten over: <strong style="color:#f5a623">${w.spinsLeft}</strong>`;

  const btn = document.getElementById('wheel-btn');
  const claimBtn = document.getElementById('wheel-claim-btn');

  if (w.spinsLeft > 0) {
    // Nog beurten over
    if (btn) { btn.disabled = false; btn.textContent = `🎡 Nog ${w.spinsLeft}x draaien!`; }
  } else {
    // Geen beurten meer → toon claim knop
    if (btn) { btn.style.display = 'none'; }
    if (claimBtn) { claimBtn.style.display = 'inline-block'; }
    if (spinEl) spinEl.innerHTML = `<span style="color:#57c785">✅ Alle beurten gebruikt!</span>`;
    sfxPerfect();
  }
}

function wheelClaimAll(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const w = window._wheel;
  if (!w) return;
  const total = w.totalCoins || 0;
  const spinsUsed = (w.spinsTotal || 1) - (w.spinsLeft || 0);
  const perfect = w.spinsTotal >= 3 && total >= 30;

  // Sluit modal EN voltooi het level correct
  document.getElementById('reward-modal')?.classList.remove('open');

}

// 5b. MEMORY KAARTJES (2 of a kind)
let memCards = [], memFlipped = [], memMatched = [], memMoves = 0;

function memCloseChallenge() { if(window._memTimeout)clearTimeout(window._memTimeout); closeChallenge(); }

function showMemoryCards() {
  // Progressie: minder paren = makkelijker, meer paren = moeilijker
  const perf = getWheelSpins(); // hergebruik prestatie-berekening
  const pairCount = perf >= 3 ? 8 : perf >= 2 ? 6 : 4;
  const emojis = ['🦁','🐯','🐉','⭐','🚀','🦄','🔥','💎','🌈','🐙'];
  const pairs = [...emojis.slice(0,pairCount), ...emojis.slice(0,pairCount)];
  memCards = shuffleArr(pairs);
  memFlipped = [];
  memMatched = [];
  memMoves = 0;
  window._memPairCount = pairCount;
  window._memStartTime = Date.now();
  // Timeout: max 90 seconden
  if (window._memTimeout) clearTimeout(window._memTimeout);
  window._memTimeout = setTimeout(() => {
    if (document.getElementById('mem-grid')) {
      const earned = Math.max(2, Math.floor(memMatched.length / 2) * 3);
      addCoins(earned);
      showToast(`⏰ Tijd! ${memMatched.length/2} paren gevonden. +${earned} coins`);
      completeChallenge(0, false);
    }
  }, 90000);
  renderMemoryCards();
}

function renderMemoryCards() {
  const box = document.getElementById('challenge-content');
  box.innerHTML = `
    <div style="text-align:center">
      <div style="font-family:'Fredoka One',cursive;color:#f5a623;font-size:1.1rem;margin-bottom:4px">
        🃏 2 of a Kind!
      </div>
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:10px">
        Zetten: ${memMoves} · Gevonden: ${memMatched.length/2}/8
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:280px;margin:0 auto 12px" id="mem-grid">
        ${memCards.map((e,i) => `
          <div onclick="flipMemCard(${i})" id="mc-${i}"
            style="width:58px;height:58px;border-radius:12px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;font-size:1.6rem;
            background:${memMatched.includes(i)?'#0f3060':memFlipped.includes(i)?'#1a3a6e':'#1a2744'};
            border:2px solid ${memMatched.includes(i)?'#57c785':memFlipped.includes(i)?'#f5a623':'rgba(255,255,255,0.1)'};
            transition:all 0.2s">
            ${memMatched.includes(i)||memFlipped.includes(i)?e:'❓'}
          </div>`).join('')}
      </div>
      <button onclick="memCloseChallenge()" class="btn-secondary">← Terug</button>
    </div>`;
}

function flipMemCard(idx) {
  if (memFlipped.length >= 2) return;
  if (memFlipped.includes(idx) || memMatched.includes(idx)) return;
  memFlipped.push(idx);
  sfxClick();
  renderMemoryCards();

  if (memFlipped.length === 2) {
    memMoves++;
    const [a, b] = memFlipped;
    if (memCards[a] === memCards[b]) {
      memMatched.push(a, b);
      memFlipped = [];
      sfxCorrect();
      if (memMatched.length === memCards.length) {
        if (window._memTimeout) clearTimeout(window._memTimeout);
        const timeSec = Math.floor((Date.now() - (window._memStartTime||Date.now())) / 1000);
        const reward = Math.max(5, 40 - memMoves - Math.floor(timeSec/10));
        setTimeout(() => {
          sfxLevelUp();
          addCoins(reward);
          showToast(`🃏 Gewonnen in ${memMoves} zetten (${timeSec}s)! +${reward} coins!`);
          completeChallenge(0, memMoves <= 10);
        }, 500);
      } else {
        setTimeout(renderMemoryCards, 300);
      }
    } else {
      setTimeout(() => { memFlipped = []; renderMemoryCards(); }, 900);
    }
  }
}

// ===== TITANS ONTDEKKINGEN SPELER =====
let discoveryStory = null;
let discoveryPhase = 'story'; // story | vraag1 | vraag2 | vraag3 | result
let discoveryScore = 0;
let discoveryQIdx  = 0;
let discoveryCorrect = [];

function showTitansOntdekking(worldIdx, playerIdx) {
  // Kies verhaal op basis van wereld (cyclisch)
  const available = TITANS_STORIES.filter(s => s.world <= Math.min(worldIdx, 9));
  const storyPool = available.length > 0 ? available : TITANS_STORIES;
  // Probeer een nieuw verhaal dat nog niet gezien is
  const seen = (getPlayer().seenStories || []);
  const unseen = storyPool.filter(s => !seen.includes(s.id));
  discoveryStory = unseen.length > 0
    ? unseen[Math.floor(Math.random() * unseen.length)]
    : storyPool[Math.floor(Math.random() * storyPool.length)];

  discoveryPhase = 'story';
  discoveryScore = 0;
  discoveryQIdx  = 0;
  discoveryCorrect = [];

  renderDiscovery();
  document.getElementById('challenge-modal').classList.add('open');
}

function renderDiscovery() {
  const s  = discoveryStory;
  const ch = TITANS_CHARS[s.char];
  const box = document.getElementById('challenge-content');

  if (discoveryPhase === 'story') {
    // Animatie scherm — het verhaal
    box.innerHTML = `
      <div style="text-align:center;padding:4px">
        <!-- Header met karakter -->
        <div style="display:flex;align-items:center;gap:10px;background:${ch.color}22;
          border-radius:14px;padding:10px;margin-bottom:10px">
          <div style="font-size:3rem;animation:tt-bounce 0.5s">${ch.emoji}</div>
          <div style="text-align:left">
            <div style="font-family:'Fredoka One',cursive;color:${ch.color};font-size:0.9rem">
              ${ch.name} ontdekte...
            </div>
            <div style="font-family:'Fredoka One',cursive;color:white;font-size:1rem;line-height:1.2">
              ${s.title}
            </div>
          </div>
        </div>

        <!-- Grote emoji illustratie -->
        <div style="font-size:3.5rem;margin:8px 0;letter-spacing:8px;animation:pulse 2s infinite">
          ${s.image}
        </div>

        <!-- Verhaal tekst — als film ondertitels -->
        <div id="story-text" style="background:#0f3460;border-radius:16px;padding:14px;
          margin:10px 0;text-align:left;font-size:0.88rem;color:white;line-height:1.7;
          white-space:pre-line;min-height:120px">
          ${s.story}
        </div>

        <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-bottom:10px">
          🧑‍🏫 Gelezen? Dan komen de vragen!
        </div>

        <button class="btn-primary" onclick="startDiscoveryVragen()" style="font-size:1rem;padding:12px 28px">
          ⚡ Ik snap het! Vragen!
        </button>
        <br><button class="btn-secondary" onclick="closeChallenge()" style="margin-top:8px">← Terug</button>
      </div>`;

  } else if (discoveryPhase === 'vraag') {
    const q = s.vragen[discoveryQIdx];
    const progress = discoveryQIdx + 1;
    const total    = s.vragen.length;

    box.innerHTML = `
      <div style="text-align:center;padding:4px">
        <!-- Progress -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="font-size:1.5rem">${ch.emoji}</div>
          <div style="flex:1;background:#1a2744;border-radius:10px;height:8px;overflow:hidden">
            <div style="width:${Math.round((discoveryQIdx/total)*100)}%;height:100%;
              background:linear-gradient(90deg,${ch.color},#f5a623);border-radius:10px;transition:width 0.3s"></div>
          </div>
          <div style="font-family:'Fredoka One',cursive;color:${ch.color};font-size:0.85rem">
            ${progress}/${total}
          </div>
        </div>

        <!-- Karakter zegt -->
        <div style="background:${ch.color}22;border-radius:14px;padding:10px;margin-bottom:10px;
          display:flex;gap:8px;align-items:flex-start">
          <div style="font-size:1.8rem">${ch.emoji}</div>
          <div style="font-family:'Fredoka One',cursive;font-size:1rem;color:white;text-align:left;line-height:1.4">
            ${q.v}
          </div>
        </div>

        <!-- Antwoord opties -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          ${shuffleArr([...q.opts]).map(o =>
            `<button class="math-btn" onclick="checkDiscovery('${o.replace(/'/g,"\\'")}')"
              style="font-size:0.88rem;padding:12px;text-align:center">${o}</button>`
          ).join('')}
        </div>

        <!-- Score -->
        <div style="font-family:'Fredoka One',cursive;color:#57c785;font-size:0.85rem">
          ⭐ ${discoveryScore}/${discoveryQIdx} goed
        </div>
      </div>`;

  } else if (discoveryPhase === 'result') {
    const pct = Math.round((discoveryScore / s.vragen.length) * 100);
    const reward = Math.round((discoveryScore / s.vragen.length) * 30) + 5;
    const stars  = pct >= 80 ? 3 : pct >= 50 ? 2 : 1;

    box.innerHTML = `
      <div style="text-align:center;padding:8px">
        <div style="font-size:3rem">${ch.emoji}</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#f5a623;margin:6px 0">
          ${pct >= 80 ? 'SUPER TITAN! 🏆' : pct >= 50 ? 'GOED GEDAAN! ⭐' : 'BLIJF LEREN! 💪'}

        <!-- Sterren -->
        <div style="font-size:2rem;margin:8px 0">
          ${Array.from({length:3},(_,i)=>`<span style="filter:${i<stars?'none':'grayscale(1)opacity(0.3)'}">⭐</span>`).join('')}
        </div>

        <div style="font-family:'Fredoka One',cursive;color:white;font-size:1rem;margin:8px 0">
          ${discoveryScore}/${s.vragen.length} vragen goed · ${pct}%
        </div>

        <!-- Recap van antwoorden -->
        <div style="background:#0f3460;border-radius:14px;padding:10px;margin:10px 0;text-align:left">
          ${s.vragen.map((q,i) => `
            <div style="display:flex;gap:8px;align-items:center;padding:4px 0;
              border-bottom:1px solid rgba(255,255,255,0.08)">
              <span>${discoveryCorrect[i] ? '✅' : '❌'}</span>
              <span style="font-size:0.78rem;color:rgba(255,255,255,0.8)">${q.v.slice(0,40)}...</span>
            </div>`).join('')}
        </div>

        <div style="font-family:'Fredoka One',cursive;color:#f5a623;font-size:1.2rem;margin:8px 0">
          +${reward} Titan Coins! 🪙
        </div>

        <!-- Finn tip -->
        <div style="background:rgba(87,199,133,0.1);border:1px solid #57c785;border-radius:12px;
          padding:8px;margin:8px 0;display:flex;gap:8px;align-items:flex-start">
          <span style="font-size:1.4rem">🧑‍🏫</span>
          <span style="font-size:0.78rem;color:rgba(255,255,255,0.8);text-align:left">
            ${pct >= 80
              ? 'Professor Finn: "Geweldig! Je hebt echt opgelet. Kennis is macht!"'
              : 'Professor Finn: "Lees het verhaal nog eens — je onthoudt meer dan je denkt!"'}
          </span>
        </div>

        <button class="btn-primary" onclick="finishDiscovery(${reward},${stars===3})"
          style="font-size:1rem;padding:12px 28px;margin-top:4px">
          TITANS GO! ⚡
        </button>
      </div>`;
  }
}

function startDiscoveryVragen() {
  discoveryPhase = 'vraag';
  discoveryQIdx  = 0;
  renderDiscovery();
}

function checkDiscovery(answer) {
  const s = discoveryStory;
  const q = s.vragen[discoveryQIdx];
  const btns = document.querySelectorAll('.math-btn');
  btns.forEach(b => b.onclick = null);

  const correct = answer === q.a;
  discoveryCorrect.push(correct);
  if (correct) {
    discoveryScore++;
    sfxCorrect();
    btns.forEach(b => { if (b.textContent.trim() === answer) b.classList.add('correct-ans'); });
  } else {
    sfxWrong();
    btns.forEach(b => {
      if (b.textContent.trim() === answer) b.classList.add('wrong-ans');
      if (b.textContent.trim() === q.a)    b.classList.add('correct-ans');
    });
  }

  discoveryQIdx++;
  if (discoveryQIdx >= s.vragen.length) {
    setTimeout(() => { discoveryPhase = 'result'; renderDiscovery(); }, 900);
  } else {
    setTimeout(() => renderDiscovery(), 900);
  }
}

function finishDiscovery(reward, perfect) {
  // Markeer verhaal als gezien
  const p = getPlayer();
  if (!p.seenStories) p.seenStories = [];
  if (!p.seenStories.includes(discoveryStory.id)) {
    p.seenStories.push(discoveryStory.id);
  }
  saveState();
  closeChallenge();
  completeChallenge(reward, perfect);
}

const REG_KEY   = 'tp_registered';
const FAMILY_KEY = 'tp_family_id';
const SHARE_URL  = 'https://jorg103.github.io/Sterrenpad2';
const INVITE_URL = SHARE_URL + '?invite=1';
const ADMIN_APPROVE_CODE = 'TITANS2024';
const FAMILY_APPROVE_CODE = 'TITANS2026';

function getFamilyId() {
  try {
    let id = localStorage.getItem(FAMILY_KEY);
    if (!id) { id = 'fam_' + Math.random().toString(36).slice(2,10); localStorage.setItem(FAMILY_KEY, id); }
    return id;
  } catch(e) { return 'fam_local'; }
}
function setFamilyId(id) { try { localStorage.setItem(FAMILY_KEY, id); } catch(e) {} }
function getRegistration() { try { return JSON.parse(localStorage.getItem(REG_KEY)||'null'); } catch(e) { return null; } }
function saveRegistration(r) { try { localStorage.setItem(REG_KEY, JSON.stringify(r)); } catch(e) {} }

function checkRegistration() {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('invite') === '1') {
    // Nieuwe familie via deellink — wis lokale data en toon registratie
    window.history.replaceState({}, '', window.location.pathname);
    try {
      localStorage.removeItem('sterrenpad_v4');
      localStorage.removeItem(REG_KEY);
      localStorage.removeItem(FAMILY_KEY);
    } catch(e) {}
    // Reset state naar leeg (geen Mila/Dewi)
    state.players = [];
    state.ownedItems = [];
    state.ownedAvatarItems = [];
    setTimeout(() => showAccessScreen(), 400);
    return false;
  }

  // Bestaande gebruiker met eigen data → altijd door
  const hasData = !!localStorage.getItem('sterrenpad_v4');
  const reg = getRegistration();
  if (hasData) {
    if (!reg || !reg.approved) saveRegistration({ approved:true, existing:true, familyId:getFamilyId(), date:new Date().toLocaleDateString('nl-NL') });
    return true;
  }
  if (reg && reg.approved) return true;
  if (reg && !reg.approved) { setTimeout(() => showPendingScreen(reg), 400); return false; }
  // Splinternieuw apparaat zonder data → registratie
  setTimeout(() => showAccessScreen(), 400);
  return false;
}

function useAccessCode() {
  const code = (document.getElementById('access-code')?.value||'').trim().toUpperCase();
  const errEl = document.getElementById('access-error');
  if (code === ADMIN_APPROVE_CODE || code === FAMILY_APPROVE_CODE) {
    saveRegistration({ approved:true, admin:(code===ADMIN_APPROVE_CODE), familyId:getFamilyId(), date:new Date().toLocaleDateString('nl-NL') });
    document.getElementById('reg-overlay')?.remove();
    showToast('✅ Welkom! Je bent ingelogd.');
    sfxLevelUp();
    updateCoinDisplay(); setWorldForPlayer(); renderHome();
  } else if (code.length > 0) {
    if (errEl) errEl.textContent = '❌ Onjuiste code.';
    sfxWrong();
    setTimeout(() => { if(errEl) errEl.textContent=''; }, 2000);
  } else {
    if (errEl) errEl.textContent = 'Voer een code in.';
  }
}

async function submitRegistration() {
  const parent = document.getElementById('reg-parent')?.value?.trim();
  const family = document.getElementById('reg-family')?.value?.trim();
  const errEl  = document.getElementById('reg-error');
  if (!parent || !family) { if(errEl) errEl.textContent='Vul naam en familienaam in!'; return; }

  const avatars = ['🦁','🐯','🐼','🦊'];
  const children = [];
  for (let i=1; i<=4; i++) {
    const name  = document.getElementById(`reg-c${i}name`)?.value?.trim();
    const grade = document.getElementById(`reg-c${i}grade`)?.value;
    if (name) children.push({ name, grade: parseInt(grade)||2, avatar: avatars[i-1] });
  }
  if (children.length === 0) { if(errEl) errEl.textContent='Voeg minimaal 1 kind toe!'; return; }

  if (errEl) errEl.textContent = '⏳ Aanmelding versturen...';
  const fid = getFamilyId();

  // Sla op in Supabase — status: pending
  await sbFetch('families?on_conflict=id', 'POST', {
    id: fid, family_name: family, parent_name: parent,
    approved: false, children, created_at: new Date().toISOString()
  });

  // Lokaal opslaan als pending
  saveRegistration({ approved:false, familyId:fid, familyName:family, parentName:parent, children, date:new Date().toLocaleDateString('nl-NL') });

  // Maak LEGE spelers aan — geen Mila/Dewi data
  state.players = children.map(ch => makeDefaultPlayer(ch.name, ch.avatar, ch.grade));
  state.currentPlayer = 0;
  state.ownedItems = children.map(() => []);
  state.ownedAvatarItems = children.map(() => []);
  state.customMissions = [];
  state.pendingChildMissions = [];
  saveState();

  document.getElementById('reg-overlay')?.remove();
  showPendingScreen({ familyName: family });
}

async function checkApprovalFromCloud() {
  showToast('⏳ Controleren...');
  const fid = getFamilyId();
  try {
    const rows = await sbFetch('families?id=eq.'+fid+'&select=approved');
    if (rows && rows.length > 0 && rows[0].approved) {
      const reg = getRegistration()||{};
      reg.approved = true;
      saveRegistration(reg);
      document.getElementById('pending-overlay')?.remove();
      showToast('✅ Goedgekeurd! Welkom bij SterrenPad!');
      sfxLevelUp();
      setTimeout(() => navigate('home'), 500);
      return;
    }
  } catch(e) {}
  showToast('⏳ Nog niet goedgekeurd. Probeer later opnieuw.');

function exportBackup() {
  try {
    const backup = { version:'sterrenpad_backup_v1', date:new Date().toISOString(), familyId:getFamilyId(), state, registration:getRegistration() };
    const blob = new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`sterrenpad-backup-${new Date().toLocaleDateString('nl-NL').replace(/\//g,'-')}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast('✅ Backup gemaakt!');
  } catch(e) { showToast('❌ Backup mislukt', true); }
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.version?.includes('sterrenpad_backup')) { showToast('❌ Ongeldig backup bestand!',true); return; }
      if (backup.state) { state={...state,...backup.state}; try{localStorage.setItem('sterrenpad_v4',JSON.stringify(state));}catch(e){} }
      if (backup.registration) saveRegistration(backup.registration);
      updateCoinDisplay(); setWorldForPlayer(); renderHome(); renderParentReport();
      showToast('✅ Backup hersteld!'); sfxLevelUp();
    } catch(e) { showToast('❌ Fout bij herstellen: '+e.message,true); }
  };
  reader.readAsText(file); input.value='';
}

function getLocalIdeas() {

function saveLocalIdea(idea) {

  ideas.push(idea);

  try { localStorage.setItem('tp_ideas', JSON.stringify(ideas)); } catch(e) {}

async function submitIdea() {
  const text = document.getElementById('idea-text')?.value?.trim();
  const cat  = document.getElementById('idea-cat')?.value;
  if (!text || text.length < 10) { showToast('Schrijf eerst je idee!', true); return; }

  const res = document.getElementById('idea-response');

  // Sla op lokaal
  const idea = { text, cat, date: new Date().toLocaleDateString('nl-NL'), fid: getFamilyId() };
  saveLocalIdea(idea);

  // Stuur naar Claude API voor een leuke reactie
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},

        model:'claude-sonnet-4-20250514',
        max_tokens:150,
        messages:[{
          role:'user',
          content:`Je bent Professor Finn uit TitansPad, een leer-app voor kinderen. 
Reageer enthousiast en positief op dit idee voor de app (max 2 zinnen, in het Nederlands, Titans Go stijl):
Categorie: ${cat}
Idee: "${text}"
Begin met "Professor Finn: " en gebruik emoji's.`
        }]
      })

    const msg = data.content?.[0]?.text || 'Geweldig idee! We kijken ernaar! ⚡';
    if (res) res.innerHTML = `<div style="background:rgba(87,199,133,0.15);border:1px solid #57c785;border-radius:10px;padding:8px;font-size:0.82rem;color:#57c785">${msg}</div>`;
  } catch(e) {

}

const DAILY_GOAL_LEVELS = 3; // 3 levels per dag = dagdoel
const DAILY_GOAL_KEY = 'tp_daily_goal';

function getDailyProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(DAILY_GOAL_KEY) || '{}');
    const today = new Date().toDateString();
    const pid = state.currentPlayer;
    if (!d[pid] || d[pid].date !== today) {
      return { date: today, levelsToday: 0, goalReached: false };
    }
    return d[pid];
  } catch(e) { return { date: new Date().toDateString(), levelsToday: 0, goalReached: false }; }
}

function updateDailyProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(DAILY_GOAL_KEY) || '{}');
    const today = new Date().toDateString();
    const pid = state.currentPlayer;
    if (!d[pid] || d[pid].date !== today) {
      d[pid] = { date: today, levelsToday: 0, goalReached: false };
    }
    d[pid].levelsToday++;
    const justReached = d[pid].levelsToday === DAILY_GOAL_LEVELS && !d[pid].goalReached;
    if (justReached) d[pid].goalReached = true;
    localStorage.setItem(DAILY_GOAL_KEY, JSON.stringify(d));
    return { levelsToday: d[pid].levelsToday, justReached };
  } catch(e) { return { levelsToday: 0, justReached: false }; }
}

// Meer coins bij zwakste vaardigheid, extra feest bij doorbraak
function getSmartReward(baseReward, type, wasCompleted) {
  if (wasCompleted) return Math.floor(baseReward / 2);
  const p = getPlayer();
  const skills = p.skills || { spell:50, math:50, lang:50 };

  // Bepaal zwakste vaardigheid
  const skillMap = { spell: skills.spell||50, math: skills.math||50, lang: skills.lang||50 };
  const typeSkillMap = { spell:'spell', math:'math', staal:'lang', topo:'lang',
    boss:'math', speed:'math', memory:'spell', ontdekking:'lang' };
  const relevantSkill = typeSkillMap[type] || 'spell';
  const minSkill = Math.min(...Object.values(skillMap));
  const isWeakest = skillMap[relevantSkill] === minSkill && minSkill < 70;

  // Bonus multiplier voor zwakste vaardigheid
  let multiplier = 1.0;
  if (isWeakest) multiplier = 1.5; // 50% meer bij zwakste vaardigheid

  return Math.round(baseReward * multiplier);
}

function checkBreakthrough(type, oldSkill, newSkill) {
  // Doorbraak: over een drempel heen (35, 65, 100, 110)
  const thresholds = [35, 65, 100, 110];
  for (const t of thresholds) {
    if (oldSkill < t && newSkill >= t) return t;
  }
  return null;
}

let simonSeq = [], simonInput = [], simonLevel = 0, simonActive = false;

function showSimonSays() {
  simonSeq = []; simonInput = []; simonLevel = 0; simonActive = false;
  const perf = getWheelSpins();
  const startLen = perf >= 3 ? 4 : perf >= 2 ? 3 : 2;

      </div>

        Onthoud de volgorde en herhaal!
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:220px;margin:0 auto 16px">
        ${colors.map((col,i) => `
          <button id="simon-${i}" onclick="simonTap(${i})"
            style="width:100px;height:100px;border-radius:20px;background:${col}44;
            border:3px solid ${col};font-size:2.5rem;cursor:pointer;
            transition:all 0.1s;-webkit-tap-highlight-color:transparent">
            ${labels[i]}
          </button>`).join('')}
      </div>
      <div id="simon-score" style="font-family:'Fredoka One',cursive;color:#57c785;font-size:0.9rem">
        Ronde: 0
      </div>
      <br><button onclick="closeChallenge()" class="btn-secondary" style="margin-top:8px">← Terug</button>
    </div>`;

  window._simon = { colors, startLen, maxLevel: perf >= 3 ? 6 : perf >= 2 ? 4 : 3 };
  setTimeout(() => simonNextRound(), 800);
}

function simonNextRound() {
  const s = window._simon;
  simonLevel++;
  simonInput = [];
  simonActive = false;

  // Voeg een kleur toe aan de reeks
  simonSeq.push(Math.floor(Math.random() * 4));

  const msg = document.getElementById('simon-msg');
  if (msg) msg.textContent = `👀 Kijk goed! Ronde ${simonLevel}`;
  const sc = document.getElementById('simon-score');
  if (sc) sc.textContent = `Ronde: ${simonLevel}`;

  // Speel reeks af
  let delay = 600;
  simonSeq.forEach((idx, i) => {
    setTimeout(() => simonFlash(idx), delay + i * 700);
  });
  setTimeout(() => {
    simonActive = true;
    if (msg) msg.textContent = '👆 Jouw beurt!';
  }, delay + simonSeq.length * 700 + 200);
}

function simonFlash(idx) {
  const btn = document.getElementById(`simon-${idx}`);
  if (!btn) return;
  const s = window._simon;
  btn.style.background = s.colors[idx];
  btn.style.transform = 'scale(0.92)';
  sfxClick();
  setTimeout(() => {
    btn.style.background = s.colors[idx] + '44';
    btn.style.transform = 'scale(1)';
  }, 350);
}

function simonTap(idx) {
  if (!simonActive) return;
  const s = window._simon;
  simonFlash(idx);
  simonInput.push(idx);

  const pos = simonInput.length - 1;
  if (simonInput[pos] !== simonSeq[pos]) {
    // Fout!
    simonActive = false;
    sfxWrong();
    const reward = Math.max(2, (simonLevel - 1) * 4);
    const msg = document.getElementById('simon-msg');
    if (msg) msg.textContent = `❌ Fout! Je haalde ronde ${simonLevel-1}. +${reward} coins`;
    setTimeout(() => { addCoins(reward); showToast(`🧠 Ronde ${simonLevel-1} gehaald! +${reward} coins`); completeChallenge(0, false); }, 1200);
    return;
  }

  if (simonInput.length === simonSeq.length) {
    simonActive = false;
    sfxCorrect();
    if (simonLevel >= s.maxLevel) {
      // Gewonnen!
      const reward = simonLevel * 6;
      const msg = document.getElementById('simon-msg');
      if (msg) msg.textContent = `🏆 GEWELDIG! Alle rondes! +${reward} coins!`;
      sfxLevelUp();
      setTimeout(() => { addCoins(reward); showToast(`🧠 Simon Says gewonnen! +${reward} coins!`); completeChallenge(0, true); }, 1200);
    } else {
      const msg = document.getElementById('simon-msg');
      if (msg) msg.textContent = `✅ Goed! Volgende ronde...`;
      setTimeout(() => simonNextRound(), 1000);
    }
  }
}

// SNEL REKENEN — zo snel mogelijk 5 sommen beantwoorden
function showSnelRekenen() {
  const perf = getWheelSpins();
  const difficulty = perf >= 3 ? 'hard' : perf >= 2 ? 'medium' : 'easy';
  const totalQ = 5;
  let current = 0, score = 0, startTime = Date.now();
  window._snelR = { difficulty, totalQ, current, score };

  function getQ() {
    if (difficulty === 'easy') {
      const a = Math.floor(Math.random()*10)+1;
      const b = Math.floor(Math.random()*10)+1;
      return { q:`${a} + ${b}`, a: a+b };
    } else if (difficulty === 'medium') {
      const a = Math.floor(Math.random()*20)+5;
      const b = Math.floor(Math.random()*10)+1;
      const ops = [
        { q:`${a} + ${b}`, a: a+b },
        { q:`${a} - ${b}`, a: a-b },
      ];
      return ops[Math.floor(Math.random()*ops.length)];
    } else {
      const a = Math.floor(Math.random()*10)+2;
      const b = Math.floor(Math.random()*10)+2;
      return { q:`${a} × ${b}`, a: a*b };
    }
  }

  function showQ() {
    const box = document.getElementById('challenge-content');
    if (!box) return;
    const q = getQ();
    window._snelR.currentQ = q;
    const wrong = [q.a+1, q.a-1, q.a+2, q.a-2, q.a+3].filter(x=>x!==q.a&&x>0);
    const opts = shuffleArr([q.a, ...wrong.slice(0,3)]);

    box.innerHTML = `
      <div style="text-align:center">
        <div style="font-family:'Fredoka One',cursive;color:#f5a623;font-size:1rem;margin-bottom:6px">
          ⚡ Snel Rekenen!
        </div>
        <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:10px">
          Vraag ${current+1}/${totalQ} · Score: ${score}/${current}
        </div>
        <div style="background:#0f3460;border-radius:16px;padding:20px;margin-bottom:14px">
          <div style="font-family:'Fredoka One',cursive;font-size:2.5rem;color:white">${q.q} = ?</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          ${opts.map(o => `
            <button onclick="snelCheck(this,${o},${q.a})"
              style="padding:16px;font-family:'Fredoka One',cursive;font-size:1.6rem;
              background:#1a2744;color:#f5a623;border:2px solid rgba(245,166,35,0.3);
              border-radius:14px;cursor:pointer">${o}</button>`).join('')}
        </div>
        <button onclick="closeChallenge()" class="btn-secondary">← Terug</button>
      </div>`;
  }

  window._snelShowQ = showQ;
  window._snelStart = Date.now();
  showQ();

  window._snelCheck = function(btn, answer, correct) {
    document.querySelectorAll('[onclick^="snelCheck"]').forEach(b => b.onclick = null);
    if (answer === correct) {
      btn.style.background = '#57c785'; sfxCorrect(); score++;
    } else {
      btn.style.background = '#e94560'; sfxWrong();
      document.querySelectorAll('[onclick^="snelCheck"]').forEach(b => {
        if (parseInt(b.textContent) === correct) b.style.background = '#57c785';
      });
    }
    current++;
    window._snelR.current = current; window._snelR.score = score;
    if (current >= totalQ) {
      const elapsed = Math.round((Date.now() - window._snelStart) / 1000);
      const reward = score * 5 + (elapsed < 20 ? 10 : 0);
      setTimeout(() => { addCoins(reward); showToast(`⚡ ${score}/${totalQ} goed! +${reward} coins!`); completeChallenge(0, score===totalQ); }, 800);
    } else {
      setTimeout(showQ, 700);
    }
  };
  showQ();
}

function snelCheck(btn, answer, correct) {
  if (window._snelCheck) window._snelCheck(btn, answer, correct);
}

    const colorKleur = kleuren.filter(k=>k.woord!==word.woord)[Math.floor(Math.random()*(kleuren.length-1))];

    const opts = shuffleArr(kleuren.map(k=>k.woord));

    box.innerHTML = `
      <div style="text-align:center">
        <div style="font-family:'Fredoka One',cursive;color:#f5a623;font-size:1rem;margin-bottom:6px">
          🎨 Kleur Match!

          Tik de KLEUR van het woord! ${current+1}/${total}
        </div>
        <div style="background:#1a2744;border-radius:16px;padding:24px;margin-bottom:14px">
          <div style="font-family:'Fredoka One',cursive;font-size:3rem;color:${colorKleur.kleur}">
            ${word.woord}
          </div>
          <div style="font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:6px">
            Welke kleur zie je?
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          ${opts.map(o => `
            <button onclick="kleurCheck(this,'${o}','${correct}')"
              style="padding:12px;font-family:'Fredoka One',cursive;font-size:1rem;
              background:${kleuren.find(k=>k.woord===o).kleur}44;
              border:2px solid ${kleuren.find(k=>k.woord===o).kleur};
              border-radius:12px;cursor:pointer;color:white">${o}</button>`).join('')}
        </div>
        <div style="font-size:0.8rem;color:#57c785">Score: ${score}/${current}</div>
        <br><button onclick="closeChallenge()" class="btn-secondary" style="margin-top:6px">← Terug</button>
      </div>`;

    window._kleurData = { correct, score, current, total };
  }

  window._kleurShowQ = showQ;
  window._kleurScore = () => score;
  window._kleurNext = function(isCorrect) {
    if (isCorrect) { score++; sfxCorrect(); } else sfxWrong();
    current++;
    if (current >= total) {
      const reward = score * 5;
      setTimeout(() => { addCoins(reward); showToast(`🎨 ${score}/${total} goed! +${reward} coins!`); completeChallenge(0, score===total); }, 700);
    } else {
      setTimeout(showQ, 600);
    }
  };
  showQ();
}

function kleurCheck(btn, answer, correct) {
  document.querySelectorAll('[onclick^="kleurCheck"]').forEach(b => b.onclick = null);
  const isCorrect = answer === correct;
  btn.style.opacity = '0.6';
  btn.style.transform = 'scale(0.95)';
  if (isCorrect) { btn.style.borderWidth = '4px'; }
  if (window._kleurNext) window._kleurNext(isCorrect);
}

let _taalSelected = null, _taalMatched = [], _taalPairs = [], _taalScore = 0;

function showTalenKoppelen(lang) {
  lang = lang || (Math.random() > 0.5 ? 'nl_en' : 'nl_es');
  const langLabel = lang === 'nl_en' ? '🇬🇧 NL → EN' : '🇪🇸 NL → ES';

  _taalPairs = shuffleArr([...allPairs]).slice(0, 5); // 5 paren
  _taalSelected = null;
  _taalMatched = [];
  _taalScore = 0;

  const leftWords  = shuffleArr(_taalPairs.map(p => p[0]));
  const rightWords = shuffleArr(_taalPairs.map(p => p[1]));

  const box = document.getElementById('challenge-content');
  box.innerHTML = `
    <div style="text-align:center">

    </div>`;

}

function taalTik(side, idx, word) {
  const btn = document.getElementById(`taal-${side}-${idx}`);
  if (!btn || btn.disabled) return;

  if (!_taalSelected) {
    // Eerste selectie
    _taalSelected = { side, idx, word };
    btn.style.background = '#1565c0';
    btn.style.borderColor = '#42a5f5';
    sfxClick();
  } else {
    // Tweede selectie — check of het een paar is
    const other = _taalSelected;
    const otherBtn = document.getElementById(`taal-${other.side}-${other.idx}`);

    // Deselecteer als zelfde knop
    if (other.side === side && other.idx === idx) {
      btn.style.background = '#1a2744';
      btn.style.borderColor = side === 'L' ? 'rgba(245,166,35,0.3)' : 'rgba(87,199,133,0.3)';
      _taalSelected = null;
      return;
    }

    // Zoek het paar
    const leftWord  = side === 'L' ? word : other.word;
    const rightWord = side === 'R' ? word : other.word;
    const isPair = _taalPairs.some(p => p[0] === leftWord && p[1] === rightWord);

    if (isPair && other.side !== side) {
      // Correct paar!
      sfxCorrect();
      [btn, otherBtn].forEach(b => {
        if (b) { b.style.background='#57c785'; b.style.borderColor='#57c785'; b.disabled=true; b.style.opacity='0.7'; }
      });
      _taalMatched.push(leftWord);
      _taalScore++;
      const msg = document.getElementById('taal-msg');
      if (msg) msg.textContent = `✅ ${leftWord} = ${rightWord}!`;

      // Gewonnen?
      if (_taalMatched.length === _taalPairs.length) {
        sfxLevelUp();
        const reward = 20 + _taalScore * 2;
        setTimeout(() => {
          addCoins(reward);
          showToast(`🌍 Alle paren gevonden! +${reward} coins!`);
          completeChallenge(0, true);
        }, 800);
      }
    } else {
      // Fout
      sfxWrong();
      [btn, otherBtn].forEach(b => {
        if (b) { b.style.background='#e9456033'; b.style.borderColor='#e94560'; }
      });
      setTimeout(() => {
        [btn, otherBtn].forEach(b => {
          if (b) { b.style.background='#1a2744'; b.style.borderColor = '#1a2744' === b.id?.includes('-L-') ? 'rgba(245,166,35,0.3)' : 'rgba(87,199,133,0.3)'; }
        });
        if (otherBtn) { otherBtn.style.borderColor = 'rgba(245,166,35,0.3)'; }
        if (btn) { btn.style.borderColor = 'rgba(87,199,133,0.3)'; }
      }, 700);
    }
    _taalSelected = null;
    if (otherBtn && !_taalMatched.includes(other.word)) {
      otherBtn.style.background = '#1a2744';
    }
  }
}

  const tl = getTimeLimit();
  if (!tl.enabled) return;
  const pid = state.currentPlayer;
  const used = getUsedTimeToday(pid);
  const elapsed = Math.floor((Date.now() - (_sessionStart||Date.now())) / 60000);
  const totalUsed = used + elapsed;
  const naam = state.players[pid]?.name || 'Kind';

  if (totalUsed >= tl.minutes && !_timeLimitWarned) {
    _timeLimitWarned = true;
    saveUsedTime(totalUsed, pid);
    showTimeLimitScreen(tl.minutes, naam);
  } else if (totalUsed >= tl.minutes - 2 && !_timeLimitWarned) {
    showToast(`⏰ ${naam}: nog 2 minuten over vandaag!`);
  }
}

function fgTouchStart(e) {
  e.preventDefault();
  const fg = window._fg;
  if (!fg || fg.phase !== 'waiting') return;
  Array.from(e.changedTouches).forEach(t => {
    fg.touches[t.identifier] = { x:t.clientX, y:t.clientY, color:'#57c785', active:true, r:50 };
  });
  fgUpdateUI();
}

function fgTouchEnd(e) {
  e.preventDefault();
  const fg = window._fg;
  if (!fg || fg.phase !== 'waiting') return;
  Array.from(e.changedTouches).forEach(t => { delete fg.touches[t.identifier]; });
  fgUpdateUI();
}

function fgUpdateUI() {
  const fg = window._fg;
  const n = Object.keys(fg.touches).length;
  const btn = document.getElementById('fg-start');
  const sub = document.getElementById('fg-sub');
  if (n >= 2) {
    if (btn) { btn.style.opacity='1'; btn.style.pointerEvents='auto'; }
    if (sub) sub.textContent = n + ' vingers gevonden! Druk START!';
  } else {
    if (btn) { btn.style.opacity='0'; btn.style.pointerEvents='none'; }
    if (sub) sub.textContent = n === 1 ? 'Leg meer vingers! (min. 2)' : 'Leg je vingers op het scherm!';
  }
}

function fgStart(e) {
  if(e){e.preventDefault();e.stopPropagation();}
  const fg = window._fg;
  if (!fg) return;
  const ids = Object.keys(fg.touches);
  if (ids.length < 2) return;
  fg.phase = 'countdown';
  document.getElementById('fg-start').style.display = 'none';
  document.getElementById('fg-sub').textContent = '';
  // Alle vingers rood
  ids.forEach(id => { fg.touches[id].color = '#e94560'; });

  let n = 5;
  const msg = document.getElementById('fg-msg');
  if (msg) { msg.style.opacity='1'; msg.textContent=n; }

  fg.countTO = setInterval(() => {
    n--;
    if (msg) msg.textContent = n > 0 ? n : '⚡ GO!';
    if (n <= 0) { clearInterval(fg.countTO); setTimeout(fgSpin, 600); }
  }, 1000);
}

function fgSpin() {
  const fg = window._fg;
  if (!fg) return;
  fg.phase = 'spinning';
  const msg = document.getElementById('fg-msg');
  if (msg) { msg.style.opacity='0'; }

  const ids = Object.keys(fg.touches);
  let green = 0;
  fg.touches[ids[0]].color = '#57c785';

  let elapsed = 0;

  function step() {
    if (!window._fg || fg.phase !== 'spinning') return;
    // Snelheidsverloop: opbouwen dan afbouwen
    const p = elapsed / 7000;
    let delay = p < 0.2 ? 250 : p < 0.5 ? 130 : p < 0.75 ? 70 : 100 + (p-0.75)*800;
    delay = Math.max(60, Math.min(300, delay));

    // Schakel groen door
    fg.touches[ids[green]].color = '#e94560';
    green = (green + 1) % ids.length;
    fg.touches[ids[green]].color = '#57c785';

    elapsed += delay;
    if (elapsed < 7000) {
      fg.spinTO = setTimeout(step, delay);
    } else {
      fgWinner(ids, green);
    }
  }
  step();
}

function fgWinner(ids, winPos) {
  const fg = window._fg;
  if (!fg) return;
  fg.phase = 'winner';

  // Verwijder alle verliezers
  ids.forEach((id, i) => {
    if (i !== winPos) fg.touches[id].active = false;
  });

  const msg = document.getElementById('fg-msg');
  const sub = document.getElementById('fg-sub');
  if (msg) { msg.textContent='🎉'; msg.style.opacity='1'; msg.style.fontSize='7rem'; }
  if (sub) { sub.textContent='JIJ BENT AAN DE BEURT!'; sub.style.color='#57c785'; sub.style.fontSize='1.6rem'; }

  // Pulseer winnende bol
  let pulse = 0;
  fg.pulseInterval = setInterval(() => {
    pulse++;
    const w = fg.touches[ids[winPos]];
    if (w) w.r = 55 + Math.sin(pulse * 0.25) * 15;
    fgDrawFrame();
  }, 30);

  // Sluit-knop
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✓ Sluiten';
  closeBtn.style.cssText = 'position:absolute;bottom:50px;left:50%;transform:translateX(-50%);' +
    'background:linear-gradient(135deg,#57c785,#2e7d32);color:white;border:none;' +
    'border-radius:20px;padding:16px 40px;font-family:"Fredoka One",cursive;' +
    'font-size:1.2rem;cursor:pointer;z-index:20';
  closeBtn.onclick = closeBtn.ontouchend = fgClose;
  document.getElementById('finger-game')?.appendChild(closeBtn);

  if (typeof sfxLevelUp === 'function') sfxLevelUp();
}

function fgDrawFrame() {
  const fg = window._fg;
  if (!fg) return;
  const {ctx, canvas, touches} = fg;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  Object.values(touches).forEach(t => {
    if (!t.active) return;
    const r = t.r || 50;
    // Gloed
    const grd = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r*2);
    grd.addColorStop(0, t.color + '88');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(t.x, t.y, r*2, 0, Math.PI*2); ctx.fill();
    // Cirkel
    ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI*2);
    ctx.fillStyle = t.color + 'cc'; ctx.fill();
    ctx.strokeStyle = t.color; ctx.lineWidth = 4; ctx.stroke();
    // Stip
    ctx.beginPath(); ctx.arc(t.x, t.y, 10, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
  });
}

function fgDraw() {
  const fg = window._fg;
  if (!fg || fg.phase === 'winner') return;
  fgDrawFrame();
  fg.rafId = requestAnimationFrame(fgDraw);
}

function fgClose(e) {
  if(e){e.preventDefault();e.stopPropagation();}
  const fg = window._fg;
  if (fg) {
    clearInterval(fg.countTO); clearTimeout(fg.spinTO);
    clearInterval(fg.pulseInterval);
    if (fg.rafId) cancelAnimationFrame(fg.rafId);
    window._fg = null;
  }
  document.getElementById('finger-game')?.remove();
}

// INIT =====
// PWA: Service Worker registreren
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Sterrenpad2/sw.js', { scope: '/Sterrenpad2/' })
      .then(reg => { reg.update(); console.log('✅ SW actief'); })
      .catch(e => console.log('SW fout:', e));
  });
}

// State migratie — veilig uitvoeren
if (!state.ownedAvatarItems) state.ownedAvatarItems = [[], []];
if (!state.customMissions) state.customMissions = [];
state.players.forEach(p => {
  if (!p.equipped)           p.equipped           = {head:null,outfit:null,accessory:null,pet:null,bg:null};
  if (!p.skills)             p.skills             = {spell:50, math:50, lang:50};
  if (!p.history)            p.history            = [];
  if (!p.wallet)             p.wallet             = {savings:0, investments:{}, goal:'limousine', goalSaved:0, lastTick:null};
  if (!p.bonusDue)           p.bonusDue           = 0;
  if (!p.badges)             p.badges             = [];
  if (!p.streakData)         p.streakData         = {lastDate:null, streak:0, totalDays:0};
  if (!p.completedMissions)  p.completedMissions  = {};
  if (!p.pendingMissions)    p.pendingMissions    = {};
  if (!p.perfectCount)       p.perfectCount       = 0;
  if (!p.totalCoinsEarned)   p.totalCoinsEarned   = 0;
  if (!p.staalCount)         p.staalCount         = 0;
  if (!p.seenStories)        p.seenStories        = [];
  // Ensure ownedItems has slots for all players
  while (state.ownedItems.length < state.players.length) state.ownedItems.push([]);
  while (state.ownedAvatarItems.length < state.players.length) state.ownedAvatarItems.push([]);
});

// DOM-afhankelijke init — wacht tot DOM klaar is
function initApp() {
  try {
    loadAudioPrefs();
    updateCoinDisplay();
    setWorldForPlayer();
    renderHome();
    selectPlayer(0);

    setTimeout(() => { updateMusicBtn(); updateSfxBtn(); }, 100);
    setTimeout(() => checkAndAwardBadges(), 1500);
    setInterval(() => checkTimeLimit(), 60000);
    setInterval(() => {
      if (document.getElementById('home-screen')?.classList.contains('active')) showFinnTip('algemeen');
    }, 480000);

    checkFamilySetup();
    // Direct sync bij opstarten
    setTimeout(() => syncToCloud(), 2000);

    // Cloud sync — renderHome opnieuw met cloud namen als die er zijn
    loadFromCloud().then(loaded => {
      if (loaded) {
        state.players.forEach(p => {
          if (!p.equipped)          p.equipped          = {head:null,outfit:null,accessory:null,pet:null,bg:null};
          if (!p.badges)            p.badges            = [];
          if (!p.streakData)        p.streakData        = {lastDate:null,streak:0,totalDays:0};
          if (!p.completedMissions) p.completedMissions = {};
          if (!p.pendingMissions)   p.pendingMissions   = {};
          if (!p.seenStories)       p.seenStories       = [];
          if (!p.wallet)            p.wallet            = {savings:0,investments:{},goal:'limousine',goalSaved:0,lastTick:null};
        });
        updateCoinDisplay();
        setWorldForPlayer();
        renderHome();
      }
      setTimeout(() => checkRegistration(), 300);
    }).catch(() => setTimeout(() => checkRegistration(), 300));

  } catch(e) {
    console.error('Init fout:', e);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
